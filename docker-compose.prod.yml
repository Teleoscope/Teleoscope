# Production overlay — always-on app server (t3.large)
#
# Architecture:
#   This server: app + MongoDB + RabbitMQ + nginx + monitor.py
#   Worker EC2 (on-demand):   docker-compose.workers.yml  — managed by monitor.py
#   GPU EC2    (on-demand):   docker-compose.vectorizer.yml — managed by monitor.py
#   Vector DB:                Zilliz Cloud (external)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Required .env additions (see .env.example):
#   NEXTAUTH_URL=https://teleoscope.ca
#   NEXTAUTH_SECRET=<generated>
#   TELEOSCOPE_BASE_URL=https://teleoscope.ca
#   MONGODB_ADMIN_PASSWORD=<generated>
#   MONGODB_PASSWORD=<generated>
#   RABBITMQ_USERNAME=teleoscope
#   RABBITMQ_PASSWORD=<generated>
#   MILVUS_DOCKER_URI=https://<endpoint>.zillizcloud.com:443
#   MILVUS_TOKEN=<zilliz-token>
#   EC2_WORKER_INSTANCE=i-0abc1234567890def
#   EC2_VECTORIZE_INSTANCE=i-0def9876543210abc
#   AWS_REGION=ca-central-1
#
# Escape hatches (run locally for debugging):
#   --profile local-workers     run Python workers on this host instead of worker EC2
#   --profile local-vectorizer  run vectorizer on this host instead of GPU EC2
#   --profile local-milvus      run Milvus/etcd/minio locally instead of Zilliz

services:
  # ── exclude from this host — run on their own on-demand EC2s ──────────────
  milvus:
    profiles: ["local-milvus"]

  etcd:
    profiles: ["local-milvus"]

  minio:
    profiles: ["local-milvus"]

  vectorizer:
    profiles: ["local-vectorizer"]

  worker-tasks:
    profiles: ["local-workers"]

  dispatch:
    profiles: ["local-workers"]

  worker-graph:
    profiles: ["local-workers"]

  uploader:
    profiles: ["local-workers"]

  files:
    profiles: ["local-workers"]

  # ── monitor: starts/stops worker EC2 and GPU EC2 based on queue depth ──────
  monitor:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: ["python", "-m", "backend.monitor"]
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      RABBITMQ_DISPATCH_QUEUE: ${RABBITMQ_DISPATCH_QUEUE:-teleoscope-dispatch}
      RABBITMQ_TASK_QUEUE: ${RABBITMQ_TASK_QUEUE:-teleoscope-tasks}
      RABBITMQ_VECTORIZE_QUEUE: ${RABBITMQ_VECTORIZE_QUEUE:-teleoscope-vectorize}
      RABBITMQ_UPLOAD_VECTOR_QUEUE: ${RABBITMQ_UPLOAD_VECTOR_QUEUE:-teleoscope-upload-vector}
      EC2_WORKER_INSTANCE: ${EC2_WORKER_INSTANCE}
      EC2_VECTORIZE_INSTANCE: ${EC2_VECTORIZE_INSTANCE}
      AWS_REGION: ${AWS_REGION:-ca-central-1}
      MONITOR_CHECK_INTERVAL: ${MONITOR_CHECK_INTERVAL:-10}
      WORKER_IDLE_STOP_MINUTES: ${WORKER_IDLE_STOP_MINUTES:-10}
      VECTORIZER_IDLE_STOP_MINUTES: ${VECTORIZER_IDLE_STOP_MINUTES:-10}
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy  # Don't start until RabbitMQ is ready; restart: unless-stopped handles recovery

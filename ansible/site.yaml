---
# site.yaml — full Teleoscope deployment from scratch.
#
# Usage:
#   1. bash scripts/setup.sh         (writes vars/vars.yaml, then runs this)
#   --- or manually: ---
#   1. cp ansible/vars/vars.yaml.example ansible/vars/vars.yaml && edit it
#   2. ansible-galaxy collection install -r ansible/requirements.yaml
#   3. export AWS_ACCESS_KEY_ID=... AWS_SECRET_ACCESS_KEY=...
#   4. ansible-playbook ansible/site.yaml
#
# After site.yaml finishes:
#   - Point  teleoscope.ca  A  <Elastic IP printed at the end>  in your DNS.
#   - Wait for DNS to propagate (~1–5 min), then:
#       ansible-playbook -i ansible/vars/inventory.yaml ansible/setup-tls.yaml
#   - For future code updates:
#       ansible-playbook -i ansible/vars/inventory.yaml ansible/deploy-update.yaml

# ── PLAY 0: Validate infra-outputs.yaml is not stale ─────────────────────────
# Runs even when --skip-tags provision is used.  If the listed instance IDs no
# longer exist in AWS, warn so the operator knows to delete infra-outputs.yaml
# and re-run without --skip-tags provision.
- name: Validate existing infrastructure (if infra-outputs.yaml exists)
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ./vars/vars.yaml
  tasks:
    - name: Check if infra-outputs.yaml exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/vars/infra-outputs.yaml"
      register: _infra_file

    - name: Load infra-outputs.yaml
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/vars/infra-outputs.yaml"
      when: _infra_file.stat.exists

    - name: Verify main EC2 still exists in AWS
      amazon.aws.ec2_instance_info:
        instance_ids: ["{{ ec2_main_id }}"]
        region: "{{ aws_region }}"
      register: _main_check
      when: _infra_file.stat.exists and ec2_main_id is defined
      failed_when: false

    - name: Warn if main EC2 is missing or terminated
      ansible.builtin.fail:
        msg: >
          infra-outputs.yaml references {{ ec2_main_id }} but it is
          {{ (_main_check.instances | default([{}]))[0].state.name | default('missing') }} in AWS.
          Delete ansible/vars/infra-outputs.yaml and re-run without --skip-tags provision
          to reprovision fresh instances.
      when:
        - _infra_file.stat.exists
        - ec2_main_id is defined
        - _main_check is defined
        - (_main_check.instances | default([])) | length == 0
            or (_main_check.instances[0].state.name | default('')) in ['terminated', 'shutting-down']

# ── PLAY 1: Provision all AWS infrastructure ─────────────────────────────────
# Skip on re-runs once infrastructure exists:
#   ansible-playbook ansible/site.yaml --skip-tags provision
- name: Provision AWS infrastructure
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [provision]
  vars_files:
    - ./vars/vars.yaml

  tasks:
    - name: Find latest Ubuntu 22.04 LTS AMI
      amazon.aws.ec2_ami_info:
        region: "{{ aws_region }}"
        owners: ["099720109477"]
        filters:
          name: "ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-*"
          state: available
          architecture: x86_64
          root-device-type: ebs
      register: ami_info

    - name: Set Ubuntu AMI fact
      ansible.builtin.set_fact:
        ubuntu_ami: "{{ (ami_info.images | sort(attribute='creation_date') | last).image_id }}"

    - name: Create main EC2 security group
      amazon.aws.ec2_security_group:
        name: teleoscope-main-sg
        description: "Teleoscope main (app, MongoDB, RabbitMQ, nginx)"
        region: "{{ aws_region }}"
        rules:
          - { proto: tcp, ports: [22],  cidr_ip: "{{ ssh_allowed_cidr }}", rule_desc: SSH }
          - { proto: tcp, ports: [80],  cidr_ip: 0.0.0.0/0, rule_desc: HTTP }
          - { proto: tcp, ports: [443], cidr_ip: 0.0.0.0/0, rule_desc: HTTPS }
        tags: { Project: teleoscope }
        state: present
      register: main_sg

    - name: Create worker EC2 security group
      amazon.aws.ec2_security_group:
        name: teleoscope-worker-sg
        description: "Teleoscope worker (tasks, graph, dispatch, uploader)"
        region: "{{ aws_region }}"
        rules:
          - { proto: tcp, ports: [22], cidr_ip: "{{ ssh_allowed_cidr }}", rule_desc: SSH }
        tags: { Project: teleoscope }
        state: present
      register: worker_sg

    - name: Create GPU vectorizer security group
      amazon.aws.ec2_security_group:
        name: teleoscope-vectorizer-sg
        description: "Teleoscope GPU vectorizer"
        region: "{{ aws_region }}"
        rules:
          - { proto: tcp, ports: [22], cidr_ip: "{{ ssh_allowed_cidr }}", rule_desc: SSH }
        tags: { Project: teleoscope }
        state: present
      register: vectorizer_sg

    # Idempotent: specify the FULL ruleset in one task so purge_rules: true
    # removes stale duplicates on re-runs instead of accumulating new copies.
    - name: Update main SG with complete ruleset (public + cross-SG)
      amazon.aws.ec2_security_group:
        name: teleoscope-main-sg
        description: "Teleoscope main (app, MongoDB, RabbitMQ, nginx)"
        region: "{{ aws_region }}"
        rules:
          - { proto: tcp, ports: [22],  cidr_ip: "{{ ssh_allowed_cidr }}", rule_desc: SSH }
          - { proto: tcp, ports: [80],  cidr_ip: 0.0.0.0/0, rule_desc: HTTP }
          - { proto: tcp, ports: [443], cidr_ip: 0.0.0.0/0, rule_desc: HTTPS }
          - { proto: tcp, ports: [5672],  group_id: "{{ worker_sg.group_id }}", rule_desc: "RabbitMQ from worker" }
          - { proto: tcp, ports: [27017], group_id: "{{ worker_sg.group_id }}", rule_desc: "MongoDB from worker" }
          - { proto: tcp, ports: [5672],  group_id: "{{ vectorizer_sg.group_id }}", rule_desc: "RabbitMQ from GPU" }
        state: present

    - name: Create IAM policy for monitor.py (start/stop EC2 tagged Project:teleoscope)
      amazon.aws.iam_managed_policy:
        policy_name: teleoscope-monitor-policy
        policy: |
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Action": ["ec2:StartInstances","ec2:StopInstances"],
                "Resource": "*",
                "Condition": {
                  "StringEquals": {"aws:ResourceTag/Project": "teleoscope"}
                }
              },
              {
                "Effect": "Allow",
                "Action": ["ec2:DescribeInstances","ec2:DescribeInstanceStatus"],
                "Resource": "*"
              }
            ]
          }
        state: present
      register: monitor_policy

    - name: Create IAM role for main EC2
      amazon.aws.iam_role:
        name: teleoscope-main-role
        assume_role_policy_document: |
          {
            "Version": "2012-10-17",
            "Statement": [{"Effect":"Allow","Principal":{"Service":"ec2.amazonaws.com"},"Action":"sts:AssumeRole"}]
          }
        managed_policies: ["{{ monitor_policy.policy.arn }}"]
        create_instance_profile: true
        state: present

    - name: Launch main EC2
      amazon.aws.ec2_instance:
        name: teleoscope-main
        key_name: "{{ aws_key_pair }}"
        instance_type: "{{ main_instance_type }}"
        image_id: "{{ ubuntu_ami }}"
        region: "{{ aws_region }}"
        security_groups: [teleoscope-main-sg]
        iam_instance_profile: teleoscope-main-role
        network: { assign_public_ip: true }
        volumes:
          - device_name: /dev/sda1
            ebs: { volume_size: "{{ main_volume_size }}", volume_type: gp3, delete_on_termination: true }
        tags: { Name: teleoscope-main, Project: teleoscope }
        wait: true
        state: running
      register: main_instance

    - name: Launch worker EC2
      amazon.aws.ec2_instance:
        name: teleoscope-worker
        key_name: "{{ aws_key_pair }}"
        instance_type: "{{ worker_instance_type }}"
        image_id: "{{ ubuntu_ami }}"
        region: "{{ aws_region }}"
        security_groups: [teleoscope-worker-sg]
        network: { assign_public_ip: true }
        volumes:
          - device_name: /dev/sda1
            ebs: { volume_size: "{{ worker_volume_size }}", volume_type: gp3, delete_on_termination: true }
        tags: { Name: teleoscope-worker, Project: teleoscope }
        wait: true
        state: running
      register: worker_instance

    - name: Launch GPU vectorizer EC2
      amazon.aws.ec2_instance:
        name: teleoscope-vectorizer
        key_name: "{{ aws_key_pair }}"
        instance_type: "{{ gpu_instance_type }}"
        image_id: "{{ ubuntu_ami }}"
        region: "{{ aws_region }}"
        availability_zone: "{{ gpu_availability_zone | default(omit) }}"
        security_groups: [teleoscope-vectorizer-sg]
        network: { assign_public_ip: true }
        volumes:
          - device_name: /dev/sda1
            ebs: { volume_size: "{{ vectorizer_volume_size }}", volume_type: gp3, delete_on_termination: true }
        tags: { Name: teleoscope-vectorizer, Project: teleoscope }
        wait: true
        state: running
      register: gpu_instance

    - name: Allocate and associate Elastic IP with main EC2
      amazon.aws.ec2_eip:
        device_id: "{{ main_instance.instances[0].instance_id }}"
        region: "{{ aws_region }}"
        release_on_disassociation: false
        in_vpc: true
        tags: { Name: teleoscope-main-eip, Project: teleoscope }
      register: eip

    - name: Write vars/infra-outputs.yaml
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/vars/infra-outputs.yaml"
        content: |
          # Auto-generated by site.yaml — do not edit.
          ec2_main_id: "{{ main_instance.instances[0].instance_id }}"
          ec2_main_public_ip: "{{ eip.public_ip }}"
          ec2_main_private_ip: "{{ main_instance.instances[0].private_ip_address }}"
          ec2_worker_instance: "{{ worker_instance.instances[0].instance_id }}"
          ec2_worker_public_ip: "{{ worker_instance.instances[0].public_ip_address }}"
          ec2_worker_private_ip: "{{ worker_instance.instances[0].private_ip_address }}"
          ec2_vectorize_instance: "{{ gpu_instance.instances[0].instance_id }}"
          ec2_vectorizer_public_ip: "{{ gpu_instance.instances[0].public_ip_address }}"
          ec2_vectorizer_private_ip: "{{ gpu_instance.instances[0].private_ip_address }}"

    # Auto-generate inventory.yaml so standalone playbooks (setup-tls, seed-demo,
    # deploy-update) work without manual IP copying from infra-outputs.yaml.
    - name: Write vars/inventory.yaml from provisioned IPs
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/vars/inventory.yaml"
        content: |
          # Auto-generated by site.yaml — do not edit.
          all:
            vars:
              ansible_user: "{{ ansible_user }}"
              ansible_ssh_private_key_file: "{{ ssh_private_key_file }}"
              ansible_ssh_extra_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o IdentitiesOnly=yes"
            children:
              main:
                hosts:
                  teleoscope-main:
                    ansible_host: "{{ eip.public_ip }}"
                    main_private_ip: "{{ main_instance.instances[0].private_ip_address }}"
                    ec2_worker_instance: "{{ worker_instance.instances[0].instance_id }}"
                    ec2_vectorize_instance: "{{ gpu_instance.instances[0].instance_id }}"
              workers:
                hosts:
                  teleoscope-worker:
                    ansible_host: "{{ worker_instance.instances[0].public_ip_address }}"
                    main_private_ip: "{{ main_instance.instances[0].private_ip_address }}"
              vectorizer:
                hosts:
                  teleoscope-vectorizer:
                    ansible_host: "{{ gpu_instance.instances[0].public_ip_address }}"

    - name: Add hosts to in-memory inventory
      ansible.builtin.add_host:
        name: "{{ item.name }}"
        ansible_host: "{{ item.ip }}"
        ansible_user: "{{ ansible_user }}"
        ansible_ssh_private_key_file: "{{ ssh_private_key_file }}"
        ansible_ssh_extra_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o IdentitiesOnly=yes"
        groups: "{{ item.group }}"
        main_private_ip: "{{ main_instance.instances[0].private_ip_address }}"
        ec2_worker_instance: "{{ worker_instance.instances[0].instance_id }}"
        ec2_vectorize_instance: "{{ gpu_instance.instances[0].instance_id }}"
      loop:
        - { name: teleoscope-main,       ip: "{{ eip.public_ip }}",                                         group: main }
        - { name: teleoscope-worker,     ip: "{{ worker_instance.instances[0].public_ip_address }}",        group: workers }
        - { name: teleoscope-vectorizer, ip: "{{ gpu_instance.instances[0].public_ip_address }}",           group: vectorizer }

# ── PLAY 2: Wait for SSH on all three instances ───────────────────────────────
- name: Wait for SSH
  hosts: main:workers:vectorizer
  gather_facts: false
  tasks:
    - name: Wait for port 22 (TCP only — no SSH auth)
      ansible.builtin.wait_for:
        port: 22
        host: "{{ ansible_host }}"
        timeout: 300
        sleep: 5
      delegate_to: localhost

    - name: Gather facts
      ansible.builtin.setup:

# ── PLAY 3: Install Docker on all three instances ─────────────────────────────
- name: Install Docker
  hosts: main:workers:vectorizer
  remote_user: "{{ ansible_user }}"
  vars_files: [./vars/vars.yaml]
  become: true
  tasks:
    - name: Install apt prerequisites
      ansible.builtin.apt:
        name: [ca-certificates, curl, gnupg]
        state: present
        update_cache: true

    - name: Create Docker apt keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      ansible.builtin.shell:
        cmd: curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present

    - name: Install Docker CE and Compose plugin
      ansible.builtin.apt:
        name: [docker-ce, docker-ce-cli, containerd.io, docker-buildx-plugin, docker-compose-plugin]
        state: present
        update_cache: true

    - name: Enable Docker daemon
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Add ubuntu user to docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

# ── PLAY 3b: Pre-flight checks (Zilliz reachability) — runs on localhost ──────
- name: Pre-flight connectivity checks
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: [./vars/vars.yaml]
  tasks:
    - name: Verify Zilliz Cloud endpoint is reachable
      ansible.builtin.command:
        cmd: >-
          python3 -c "
          import socket, sys
          from urllib.parse import urlparse
          u = urlparse('{{ milvus_uri }}')
          host = u.hostname or u.path
          port = u.port or 19530
          try:
              socket.create_connection((host, port), timeout=15)
              print(f'Zilliz OK: {host}:{port}')
          except Exception as e:
              print(f'Zilliz UNREACHABLE: {host}:{port}: {e}')
              sys.exit(1)
          "
      register: zilliz_check
      failed_when: zilliz_check.rc != 0
      changed_when: false

    - name: Zilliz connectivity result
      ansible.builtin.debug:
        msg: "{{ zilliz_check.stdout }}"

# ── PLAY 4: Deploy main stack (app + MongoDB + RabbitMQ + monitor) ────────────
- name: Deploy main stack
  hosts: main
  remote_user: "{{ ansible_user }}"
  vars_files: [./vars/vars.yaml, ./vars/infra-outputs.yaml]
  tasks:
    - name: Clone Teleoscope repo
      ansible.builtin.git:
        repo: "https://github.com/Teleoscope/Teleoscope.git"
        dest: "{{ remote_prefix }}/{{ ansible_user }}/Teleoscope"
        version: main
        force: true  # Overwrite any server-side edits so re-runs are reliable

    - name: Write production .env
      ansible.builtin.template:
        src: ./.env.j2
        dest: "{{ remote_prefix }}/{{ ansible_user }}/Teleoscope/.env"
        mode: "0600"

    # Snapshot MongoDB before deploying so a failed migration can be rolled back.
    - name: Backup MongoDB before deploy
      ansible.builtin.shell: |
        STAMP=$(date +%Y%m%d-%H%M%S)
        DEST=/tmp/mongodump-pre-deploy-${STAMP}
        if ! docker ps --format '{{.Names}}' | grep -q teleoscope-mongodb-1; then
          echo "SKIPPED: mongodb container not running (first deploy)"
          exit 0
        fi
        if docker exec teleoscope-mongodb-1 \
            mongodump \
            --username admin \
            --password "{{ mongodb_admin_password }}" \
            --authenticationDatabase admin \
            --out /tmp/mongodump-${STAMP} 2>&1; then
          docker cp teleoscope-mongodb-1:/tmp/mongodump-${STAMP} ${DEST} 2>/dev/null || true
          echo "OK: backup written to ${DEST}"
        else
          echo "WARNING: mongodump failed — deploying without backup"
        fi
      register: _backup
      changed_when: false
      failed_when: false
      become: true

    - name: Show backup result
      ansible.builtin.debug:
        msg: "{{ _backup.stdout_lines | default(['(no output)']) }}"

    - name: Check if main app image is already built
      ansible.builtin.command: docker image inspect teleoscope-app --format "exists"
      register: _main_image
      failed_when: false
      changed_when: false
      become: true

    - name: Get git SHA for image tagging
      ansible.builtin.command:
        cmd: git rev-parse --short HEAD
        chdir: "{{ remote_prefix }}/{{ ansible_user }}/Teleoscope"
      register: _git_sha
      changed_when: false

    - name: Start main Docker Compose stack
      community.docker.docker_compose_v2:
        project_src: "{{ remote_prefix }}/{{ ansible_user }}/Teleoscope"
        files: [docker-compose.yml, docker-compose.prod.yml]
        build: "{{ 'always' if (rebuild | default(false) | bool or _main_image.rc != 0) else 'never' }}"
        state: present
      become: true

    - name: Tag app image with git SHA for rollback reference
      ansible.builtin.shell: |
        docker tag teleoscope-app:latest teleoscope-app:{{ _git_sha.stdout }} 2>/dev/null || true
        docker tag teleoscope-monitor:latest teleoscope-monitor:{{ _git_sha.stdout }} 2>/dev/null || true
      become: true
      changed_when: false

    # Use TCP port check — avoids depending on Zilliz Cloud being reachable.
    # The app process being up on port 3000 is the correct success signal here.
    - name: Wait for app to accept TCP connections on port 3000
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 3000
        timeout: 300
        sleep: 5

    - name: Install nginx (HTTP only — TLS added by setup-tls.yaml after DNS)
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: true
      become: true

    - name: Write nginx HTTP config
      ansible.builtin.template:
        src: ./teleoscope.ca.http.j2
        dest: /etc/nginx/sites-available/teleoscope.ca
      become: true

    - name: Enable site and remove default
      ansible.builtin.file:
        src: /etc/nginx/sites-available/teleoscope.ca
        dest: /etc/nginx/sites-enabled/teleoscope.ca
        state: link
      become: true

    - name: Remove default nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      become: true

    - name: Reload nginx
      ansible.builtin.shell: nginx -t && systemctl reload nginx
      become: true

    - name: Configure UFW
      ansible.builtin.import_tasks: ufw-tasks.yaml
      become: true

# ── PLAY 5: Deploy worker stack, then stop the worker EC2 ────────────────────
- name: Deploy worker stack
  hosts: workers
  remote_user: "{{ ansible_user }}"
  vars_files: [./vars/vars.yaml, ./vars/infra-outputs.yaml]
  tasks:
    - name: Clone Teleoscope repo
      ansible.builtin.git:
        repo: "https://github.com/Teleoscope/Teleoscope.git"
        dest: "{{ remote_prefix }}/{{ ansible_user }}/Teleoscope"
        version: main
        force: true  # Overwrite any server-side edits so re-runs are reliable

    - name: Write worker .env
      ansible.builtin.template:
        src: ./.env.workers.j2
        dest: "{{ remote_prefix }}/{{ ansible_user }}/Teleoscope/.env"
        mode: "0600"

    - name: Check if worker image is already built
      ansible.builtin.command: docker image inspect teleoscope-dispatch --format "exists"
      register: _worker_image
      failed_when: false
      changed_when: false
      become: true

    - name: Build worker images
      community.docker.docker_compose_v2:
        project_src: "{{ remote_prefix }}/{{ ansible_user }}/Teleoscope"
        files: [docker-compose.workers.yml]
        build: "{{ 'always' if (rebuild | default(false) | bool or _worker_image.rc != 0) else 'never' }}"
        state: present
      become: true

    - name: Configure UFW — SSH only on worker EC2
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp
      become: true

    - name: Enable UFW on worker EC2
      community.general.ufw:
        state: enabled
        policy: deny
      become: true

    - name: Stop worker EC2 (monitor.py will start it on demand)
      amazon.aws.ec2_instance:
        instance_ids: ["{{ hostvars['teleoscope-worker']['ec2_worker_instance'] | default(ec2_worker_instance) }}"]
        region: "{{ aws_region }}"
        state: stopped
        wait: true  # Confirm stop completed; avoids monitor.py racing a transitional state
      delegate_to: localhost

# ── PLAY 6: Deploy GPU vectorizer, then stop the GPU EC2 ─────────────────────
- name: Deploy GPU vectorizer stack
  hosts: vectorizer
  remote_user: "{{ ansible_user }}"
  vars_files: [./vars/vars.yaml, ./vars/infra-outputs.yaml]
  tasks:
    - name: Clone Teleoscope repo
      ansible.builtin.git:
        repo: "https://github.com/Teleoscope/Teleoscope.git"
        dest: "{{ remote_prefix }}/{{ ansible_user }}/Teleoscope"
        version: main
        force: true  # Overwrite any server-side edits so re-runs are reliable

    - name: Write vectorizer .env
      ansible.builtin.template:
        src: ./.env.vectorizer.j2
        dest: "{{ remote_prefix }}/{{ ansible_user }}/Teleoscope/.env"
        mode: "0600"

    - name: Check if vectorizer image is already built
      ansible.builtin.command: docker image inspect teleoscope-vectorizer --format "exists"
      register: _vectorizer_image
      failed_when: false
      changed_when: false
      become: true

    - name: Build vectorizer image (downloads BGE-M3 model ~1 GB)
      community.docker.docker_compose_v2:
        project_src: "{{ remote_prefix }}/{{ ansible_user }}/Teleoscope"
        files: [docker-compose.vectorizer.yml]
        build: "{{ 'always' if (rebuild | default(false) | bool or _vectorizer_image.rc != 0) else 'never' }}"
        state: present
      become: true
      register: _vectorizer_build

    # Verify the image actually exists before stopping the EC2 — a failed build
    # followed by a stop would leave the GPU EC2 with no working vectorizer.
    - name: Verify vectorizer image is present after build
      ansible.builtin.command: docker image inspect teleoscope-vectorizer --format "exists"
      register: _vectorizer_built
      failed_when: _vectorizer_built.rc != 0
      changed_when: false
      become: true

    - name: Configure UFW — SSH only on GPU EC2
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp
      become: true

    - name: Enable UFW on GPU EC2
      community.general.ufw:
        state: enabled
        policy: deny
      become: true

    - name: Stop GPU EC2 (monitor.py will start it on demand)
      amazon.aws.ec2_instance:
        instance_ids: ["{{ hostvars['teleoscope-vectorizer']['ec2_vectorize_instance'] | default(ec2_vectorize_instance) }}"]
        region: "{{ aws_region }}"
        state: stopped
        wait: true  # Confirm stop completed; avoids monitor.py racing a transitional state
      delegate_to: localhost

# ── PLAY 7: Post-deploy verification ─────────────────────────────────────────
- name: Verify deployment
  hosts: main
  remote_user: "{{ ansible_user }}"
  gather_facts: false
  vars_files: [./vars/vars.yaml, ./vars/infra-outputs.yaml]
  tasks:
    - name: Check MongoDB is responding
      ansible.builtin.shell: |
        docker exec teleoscope-mongodb-1 \
          mongosh --host 127.0.0.1 \
          -u admin -p "{{ mongodb_admin_password }}" \
          --authenticationDatabase admin --quiet \
          --eval 'db.adminCommand({ping:1}).ok'
      register: mongo_check
      changed_when: false
      become: true

    - name: Check RabbitMQ is running
      ansible.builtin.command: >
        docker exec teleoscope-rabbitmq-1 rabbitmq-diagnostics check_running
      register: rabbit_check
      changed_when: false
      become: true

    - name: Check app port 3000 is accepting connections
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 3000
        timeout: 30

    - name: Verification summary
      ansible.builtin.debug:
        msg:
          - "MongoDB: {{ 'OK' if mongo_check.rc == 0 else 'FAILED' }}"
          - "RabbitMQ: {{ 'OK' if rabbit_check.rc == 0 else 'FAILED' }}"
          - "App port 3000: OK"

# ── PLAY 8: Final summary ─────────────────────────────────────────────────────
- name: Deployment summary
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files: [./vars/vars.yaml, ./vars/infra-outputs.yaml]
  tasks:
    - name: Print next steps
      ansible.builtin.debug:
        msg:
          - "============================================================"
          - "  Teleoscope deployed — action required before TLS"
          - "============================================================"
          - ""
          - "  Elastic IP:  {{ ec2_main_public_ip }}"
          - "  inventory.yaml written to: ansible/vars/inventory.yaml"
          - ""
          - "  1. Add DNS record:"
          - "       {{ teleoscope.ca }}  A  {{ ec2_main_public_ip }}"
          - ""
          - "  2. Wait ~1-5 min for DNS to propagate, then run:"
          - "       ansible-playbook -i ansible/vars/inventory.yaml ansible/setup-tls.yaml"
          - ""
          - "  That gets the Let's Encrypt cert and enables HTTPS."
          - ""
          - "  Worker EC2:  {{ ec2_worker_instance }} (stopped — monitor.py starts on demand)"
          - "  GPU EC2:     {{ ec2_vectorize_instance }} (stopped — monitor.py starts on demand)"
          - ""
          - "  Future updates:"
          - "    ansible-playbook -i ansible/vars/inventory.yaml ansible/deploy-update.yaml"
          - "============================================================"

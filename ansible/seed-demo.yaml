---
# seed-demo.yaml — Load the Teleoscope demo corpus into MongoDB + Zilliz Cloud.
#
# Run AFTER site.yaml has finished and the stack is healthy.
# The demo data is downloaded automatically from Teleoscope/teleoscope-demo-data
# (shallow clone) if not already present on the server.
#
# Usage:
#   ansible-playbook -i ansible/vars/inventory.yaml ansible/seed-demo.yaml
#
# Idempotent:
#   - Milvus vectors are upserted (safe to re-run).
#   - MongoDB: --workspace-documents-only replaces only the demo workspace
#     documents instead of dropping the entire documents collection, so
#     existing user data in other workspaces is preserved.
#
# After this playbook the /demo route should show the corpus with working
# vector search (ranking / similarity).

- name: Seed demo corpus into MongoDB + Zilliz
  hosts: main
  remote_user: "{{ ansible_user }}"
  vars_files:
    - ./vars/vars.yaml
    - ./vars/infra-outputs.yaml
  vars:
    # Keep the SSH control socket alive while the seed script runs.
    # 347 k vectors × ~5 s/batch ≈ 30 min for Zilliz Cloud; firewalls/NAT
    # devices that close idle TCP connections after ~60 s will kill the mux
    # socket and make every subsequent task "UNREACHABLE" even though the
    # seed is still running on the server.  ServerAliveInterval sends a
    # keep-alive every 30 s; ServerAliveCountMax=240 allows up to 2 hours
    # of silence before the client gives up.
    ansible_ssh_common_args: >-
      -o ServerAliveInterval=30
      -o ServerAliveCountMax=240

  tasks:
    - name: Install system packages required for seeding
      ansible.builtin.apt:
        name:
          - python3-venv
          - git-lfs       # needed to fetch real LFS objects (not pointer stubs)
        state: present
        update_cache: false
      become: true

    - name: Configure git-lfs for the remote user
      ansible.builtin.command:
        cmd: git lfs install
      changed_when: false

    - name: Remove documents.jsonl.7z if it is a Git LFS pointer stub
      # A shallow git clone without git-lfs leaves a ~130-byte text stub instead of
      # the real archive.  The seed script treats any existing file as valid data and
      # skips the re-download, then fails with "not a 7z file".  Delete the stub here
      # so the seed script triggers a fresh git-lfs-aware download on next run.
      ansible.builtin.shell:
        cmd: >-
          if [ -f "{{ remote_prefix }}/{{ ansible_user }}/Teleoscope/data/documents.jsonl.7z" ] &&
          head -c 43 "{{ remote_prefix }}/{{ ansible_user }}/Teleoscope/data/documents.jsonl.7z" |
          grep -q "^version https://git-lfs"; then
            rm "{{ remote_prefix }}/{{ ansible_user }}/Teleoscope/data/documents.jsonl.7z" &&
            echo "removed LFS stub";
          else
            echo "not an LFS stub";
          fi
      register: lfs_stub_result
      changed_when: "'removed LFS stub' in lfs_stub_result.stdout"

    - name: Create seed virtualenv and install Python dependencies
      ansible.builtin.pip:
        name:
          - py7zr
          - pyarrow
          - tqdm
          - python-dotenv
          - pymongo
          - pymilvus
        virtualenv: "{{ remote_prefix }}/{{ ansible_user }}/Teleoscope/.venv-seed"
        virtualenv_command: python3 -m venv

    - name: Sync MongoDB teleoscope user password with vars.yaml
      # mongo-init.js runs only once on fresh volume creation.  If the password
      # drifted between vars.yaml and the live MongoDB instance, the seed script
      # will hit AuthenticationFailed (code 18) even though .env looks correct.
      # updateUser is idempotent — safe to run even when the password matches.
      ansible.builtin.shell: |
        docker exec teleoscope-mongodb-1 \
          mongosh --host 127.0.0.1 \
          -u admin -p "{{ mongodb_admin_password }}" \
          --authenticationDatabase admin --quiet \
          --eval 'db.getSiblingDB("admin").updateUser(
            "{{ mongodb_dev_name }}",
            {pwd: "{{ mongodb_dev_password }}"}
          )'
      become: true
      changed_when: false
      no_log: true  # prevent password appearing in ansible -v output

    - name: Run seed-demo-corpus.py (MongoDB + Zilliz)
      block:
        - name: Launch seed script
          ansible.builtin.shell:
            # Redirect both stdout and stderr to a log file so we can display
            # them in the 'always' block below regardless of exit status.
            # The shell task itself stays no_log to keep MONGODB_URI out of
            # ansible -v output; the log file read is a plain task with no
            # sensitive variables so it is always visible.
            cmd: >-
              {{ remote_prefix }}/{{ ansible_user }}/Teleoscope/.venv-seed/bin/python
              scripts/seed-demo-corpus.py
              --no-progress
              --workspace-documents-only
              > /tmp/seed-demo.log 2>&1
            chdir: "{{ remote_prefix }}/{{ ansible_user }}/Teleoscope"
          environment:
            PYTHONPATH: "{{ remote_prefix }}/{{ ansible_user }}/Teleoscope"
            # MongoDB: connect directly (replicaSet node) using the app user.
            MONGODB_URI: "mongodb://{{ mongodb_dev_name }}:{{ mongodb_dev_password }}@localhost:27017/{{ mongodb_database }}?directConnection=true&serverSelectionTimeoutMS=10000&authSource=admin"
            MONGODB_DATABASE: "{{ mongodb_database }}"
            # Milvus / Zilliz Cloud.
            # NOTE: containers use MILVUS_DOCKER_URI mapped to MILVUS_URI internally;
            # the seed script runs on the host so we pass MILVUS_URI directly.
            MILVUS_URI: "{{ milvus_uri }}"
            MILVUS_TOKEN: "{{ milvus_token }}"
            MILVUS_DATABASE: "{{ milvus_dbname | default('teleoscope') }}"
            # Zilliz is HTTPS — skip the raw TCP port preflight check.
            MILVUS_SKIP_TCP_PREFLIGHT: "1"
            TELEOSCOPE_DATA_DIR: "{{ remote_prefix }}/{{ ansible_user }}/Teleoscope/data"
          no_log: true  # Prevent MONGODB_URI (with password) appearing in ansible -v output
          # Seed can take >30 min on first run: 347 k vectors → 348 HTTPS RPCs to
          # Zilliz Cloud at ~5 s each ≈ 29 min just for upsert, plus Mongo bulk
          # load.  Set timeout to 2 hours so Ansible does not kill the task early.
          # Do NOT use async here: async tasks that fail with jid=None bypass block
          # error-handling entirely, so the always section never runs and the log
          # file is never shown.  Synchronous execution with a generous task-level
          # timeout is reliable and lets block/always work as expected.
          timeout: 7200

      always:
        - name: Show seed output (stdout + stderr)
          ansible.builtin.command:
            cmd: tail -200 /tmp/seed-demo.log
          register: seed_log
          changed_when: false
          failed_when: false
        - ansible.builtin.debug:
            var: seed_log.stdout_lines

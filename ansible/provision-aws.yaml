---
# provision-aws.yaml — provision all AWS infrastructure for Teleoscope.
#
# Creates (idempotently):
#   - Security groups: main, worker, GPU vectorizer
#   - IAM policy + role (main EC2) so monitor.py can start/stop worker + GPU instances
#   - main EC2   (t3.large)   — app, MongoDB, RabbitMQ, nginx, monitor.py
#   - worker EC2 (m6i.large)  — Python workers (stopped after provisioning)
#   - GPU EC2    (g5.xlarge)  — BGE-M3 vectorizer (stopped after provisioning)
#   - Elastic IP on main EC2
#   - vars/infra-outputs.yaml with all instance IDs and IPs
#
# Usage:
#   ansible-playbook ansible/provision-aws.yaml
#
# Requirements: amazon.aws collection + AWS credentials in environment.

- name: Provision AWS infrastructure
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ./vars/vars.yaml

  tasks:
    # ── AMI ──────────────────────────────────────────────────────────────────
    - name: Find latest Ubuntu 22.04 LTS AMI (Canonical)
      amazon.aws.ec2_ami_info:
        region: "{{ aws_region }}"
        owners: ["099720109477"]
        filters:
          name: "ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-*"
          state: available
          architecture: x86_64
          root-device-type: ebs
      register: ami_info

    - name: Set Ubuntu AMI fact
      ansible.builtin.set_fact:
        ubuntu_ami: "{{ (ami_info.images | sort(attribute='creation_date') | last).image_id }}"

    - name: Show AMI
      ansible.builtin.debug:
        msg: "Ubuntu 22.04 AMI: {{ ubuntu_ami }}"

    # ── Security groups ───────────────────────────────────────────────────────
    - name: Create main EC2 security group
      amazon.aws.ec2_security_group:
        name: teleoscope-main-sg
        description: "Teleoscope main (app, MongoDB, RabbitMQ, nginx)"
        region: "{{ aws_region }}"
        rules:
          - proto: tcp
            ports: [22]
            cidr_ip: "{{ ssh_allowed_cidr }}"
            rule_desc: SSH
          - proto: tcp
            ports: [80]
            cidr_ip: 0.0.0.0/0
            rule_desc: HTTP
          - proto: tcp
            ports: [443]
            cidr_ip: 0.0.0.0/0
            rule_desc: HTTPS
        tags: { Project: teleoscope }
        state: present
      register: main_sg

    - name: Create worker EC2 security group
      amazon.aws.ec2_security_group:
        name: teleoscope-worker-sg
        description: "Teleoscope worker (tasks, graph, dispatch, uploader)"
        region: "{{ aws_region }}"
        rules:
          - proto: tcp
            ports: [22]
            cidr_ip: "{{ ssh_allowed_cidr }}"
            rule_desc: SSH
        tags: { Project: teleoscope }
        state: present
      register: worker_sg

    - name: Create GPU vectorizer security group
      amazon.aws.ec2_security_group:
        name: teleoscope-vectorizer-sg
        description: "Teleoscope GPU vectorizer"
        region: "{{ aws_region }}"
        rules:
          - proto: tcp
            ports: [22]
            cidr_ip: "{{ ssh_allowed_cidr }}"
            rule_desc: SSH
        tags: { Project: teleoscope }
        state: present
      register: vectorizer_sg

    - name: Allow RabbitMQ + MongoDB from worker and GPU EC2 to main EC2
      amazon.aws.ec2_security_group:
        name: teleoscope-main-sg
        description: "Teleoscope main (app, MongoDB, RabbitMQ, nginx)"
        region: "{{ aws_region }}"
        purge_rules: false
        rules:
          - proto: tcp
            ports: [5672]
            group_id: "{{ worker_sg.group_id }}"
            rule_desc: "RabbitMQ from worker EC2"
          - proto: tcp
            ports: [27017]
            group_id: "{{ worker_sg.group_id }}"
            rule_desc: "MongoDB from worker EC2"
          - proto: tcp
            ports: [5672]
            group_id: "{{ vectorizer_sg.group_id }}"
            rule_desc: "RabbitMQ from GPU EC2"
        state: present

    # ── IAM ───────────────────────────────────────────────────────────────────
    - name: Create IAM policy for monitor.py
      amazon.aws.iam_managed_policy:
        policy_name: teleoscope-monitor-policy
        policy: |
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Action": ["ec2:StartInstances", "ec2:StopInstances", "ec2:DescribeInstances"],
              "Resource": "*"
            }]
          }
        state: present
      register: monitor_policy

    - name: Create IAM role for main EC2
      amazon.aws.iam_role:
        name: teleoscope-main-role
        assume_role_policy_document: |
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Principal": { "Service": "ec2.amazonaws.com" },
              "Action": "sts:AssumeRole"
            }]
          }
        managed_policies: ["{{ monitor_policy.policy.arn }}"]
        create_instance_profile: true
        state: present

    # ── EC2 instances ─────────────────────────────────────────────────────────
    - name: Launch main EC2
      amazon.aws.ec2_instance:
        name: teleoscope-main
        key_name: "{{ aws_key_pair }}"
        instance_type: "{{ main_instance_type }}"
        image_id: "{{ ubuntu_ami }}"
        region: "{{ aws_region }}"
        security_groups: [teleoscope-main-sg]
        iam_instance_profile: teleoscope-main-role
        network: { assign_public_ip: true }
        volumes:
          - device_name: /dev/sda1
            ebs: { volume_size: "{{ main_volume_size }}", volume_type: gp3, delete_on_termination: true }
        tags: { Name: teleoscope-main, Project: teleoscope }
        wait: true
        state: running
      register: main_instance

    - name: Launch worker EC2
      amazon.aws.ec2_instance:
        name: teleoscope-worker
        key_name: "{{ aws_key_pair }}"
        instance_type: "{{ worker_instance_type }}"
        image_id: "{{ ubuntu_ami }}"
        region: "{{ aws_region }}"
        security_groups: [teleoscope-worker-sg]
        network: { assign_public_ip: true }
        volumes:
          - device_name: /dev/sda1
            ebs: { volume_size: "{{ worker_volume_size }}", volume_type: gp3, delete_on_termination: true }
        tags: { Name: teleoscope-worker, Project: teleoscope }
        wait: true
        state: running
      register: worker_instance

    - name: Launch GPU vectorizer EC2
      amazon.aws.ec2_instance:
        name: teleoscope-vectorizer
        key_name: "{{ aws_key_pair }}"
        instance_type: "{{ gpu_instance_type }}"
        image_id: "{{ ubuntu_ami }}"
        region: "{{ aws_region }}"
        security_groups: [teleoscope-vectorizer-sg]
        network: { assign_public_ip: true }
        volumes:
          - device_name: /dev/sda1
            ebs: { volume_size: "{{ vectorizer_volume_size }}", volume_type: gp3, delete_on_termination: true }
        tags: { Name: teleoscope-vectorizer, Project: teleoscope }
        wait: true
        state: running
      register: gpu_instance

    # ── Elastic IP ────────────────────────────────────────────────────────────
    - name: Allocate and associate Elastic IP with main EC2
      amazon.aws.ec2_eip:
        device_id: "{{ main_instance.instances[0].instance_id }}"
        region: "{{ aws_region }}"
        release_on_disassociation: false
        in_vpc: true
        tags: { Name: teleoscope-main-eip, Project: teleoscope }
      register: eip

    # ── Write outputs ─────────────────────────────────────────────────────────
    - name: Write vars/infra-outputs.yaml
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/vars/infra-outputs.yaml"
        content: |
          # Auto-generated by provision-aws.yaml — do not edit manually.
          ec2_main_id: "{{ main_instance.instances[0].instance_id }}"
          ec2_main_public_ip: "{{ eip.public_ip }}"
          ec2_main_private_ip: "{{ main_instance.instances[0].private_ip_address }}"
          ec2_worker_instance: "{{ worker_instance.instances[0].instance_id }}"
          ec2_worker_public_ip: "{{ worker_instance.instances[0].public_ip_address }}"
          ec2_worker_private_ip: "{{ worker_instance.instances[0].private_ip_address }}"
          ec2_vectorize_instance: "{{ gpu_instance.instances[0].instance_id }}"
          ec2_vectorizer_public_ip: "{{ gpu_instance.instances[0].public_ip_address }}"
          ec2_vectorizer_private_ip: "{{ gpu_instance.instances[0].private_ip_address }}"

    # ── In-memory inventory for subsequent plays ──────────────────────────────
    - name: Add main EC2 to inventory
      ansible.builtin.add_host:
        name: teleoscope-main
        ansible_host: "{{ eip.public_ip }}"
        ansible_user: "{{ ansible_user }}"
        ansible_ssh_private_key_file: "{{ ssh_private_key_file }}"
        groups: main
        ec2_worker_instance: "{{ worker_instance.instances[0].instance_id }}"
        ec2_vectorize_instance: "{{ gpu_instance.instances[0].instance_id }}"

    - name: Add worker EC2 to inventory
      ansible.builtin.add_host:
        name: teleoscope-worker
        ansible_host: "{{ worker_instance.instances[0].public_ip_address }}"
        ansible_user: "{{ ansible_user }}"
        ansible_ssh_private_key_file: "{{ ssh_private_key_file }}"
        groups: workers
        main_ec2_private_ip: "{{ main_instance.instances[0].private_ip_address }}"

    - name: Add GPU EC2 to inventory
      ansible.builtin.add_host:
        name: teleoscope-vectorizer
        ansible_host: "{{ gpu_instance.instances[0].public_ip_address }}"
        ansible_user: "{{ ansible_user }}"
        ansible_ssh_private_key_file: "{{ ssh_private_key_file }}"
        groups: vectorizer
        main_ec2_private_ip: "{{ main_instance.instances[0].private_ip_address }}"

    - name: Provisioning summary
      ansible.builtin.debug:
        msg:
          - "Main EC2:       {{ eip.public_ip }} ({{ main_instance.instances[0].instance_id }})"
          - "Worker EC2:     {{ worker_instance.instances[0].public_ip_address }} ({{ worker_instance.instances[0].instance_id }})"
          - "GPU EC2:        {{ gpu_instance.instances[0].public_ip_address }} ({{ gpu_instance.instances[0].instance_id }})"
          - "Elastic IP:     {{ eip.public_ip }}"
          - "Outputs:        ansible/vars/infra-outputs.yaml"

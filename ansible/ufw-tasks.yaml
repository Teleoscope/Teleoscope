---
# Shared UFW task list — included by deploy-main.yaml and site.yaml.
# Caller must set become: true.

# Rate-limit SSH: max 6 new connections per 30s per source IP (brute-force mitigation).
- name: UFW - rate-limit SSH
  community.general.ufw:
    rule: limit
    port: "22"
    proto: tcp

- name: UFW - allow HTTP
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: UFW - allow HTTPS
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp

# Allow worker / vectorizer EC2s (same VPC) to reach MongoDB + RabbitMQ.
# Use vpc_cidr from vars.yaml (default: 172.31.0.0/16 for AWS default VPC).
# AWS security groups already enforce cross-SG rules; UFW is belt-and-suspenders.
- name: UFW - allow MongoDB from VPC CIDR
  community.general.ufw:
    rule: allow
    port: "27017"
    proto: tcp
    src: "{{ vpc_cidr | default('172.31.0.0/16') }}"

- name: UFW - allow RabbitMQ AMQP from VPC CIDR
  community.general.ufw:
    rule: allow
    port: "5672"
    proto: tcp
    src: "{{ vpc_cidr | default('172.31.0.0/16') }}"

- name: UFW - enable
  community.general.ufw:
    state: enabled
    policy: deny

---
# Shared UFW task list — included by deploy-main.yaml and site.yaml.
# Caller must set become: true.

- name: UFW - allow SSH
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: UFW - allow HTTP
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: UFW - allow HTTPS
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: UFW - enable
  community.general.ufw:
    state: enabled
    policy: deny

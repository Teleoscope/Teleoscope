---
# check-health.yaml — live health report for a running Teleoscope deployment.
#
# Design: every play runs with failed_when: false / ignore_errors so the full
# report is always printed regardless of individual failures. Each play tracks
# its own failures in a list and delegates that list to localhost at the end.
# A final play on localhost aggregates all lists; if any failures exist it calls
# ansible.builtin.fail so Ansible prints them in RED and exits non-zero.
#
# Usage:
#   ansible-playbook -i ansible/vars/inventory.yaml ansible/check-health.yaml
#
# Requires: infra-outputs.yaml to exist (written by site.yaml Play 1)

# ── PLAY 1: EC2 and external service checks (from local machine) ──────────────
- name: Check EC2 states and external connectivity
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ./vars/vars.yaml
    - ./vars/infra-outputs.yaml

  tasks:
    - name: Initialize local failure list
      ansible.builtin.set_fact:
        local_failures: []

    - name: Get current state of all three EC2 instances
      amazon.aws.ec2_instance_info:
        instance_ids:
          - "{{ ec2_main_id }}"
          - "{{ ec2_worker_instance }}"
          - "{{ ec2_vectorize_instance }}"
        region: "{{ aws_region }}"
      register: ec2_info
      failed_when: false

    - name: EC2 instance states
      ansible.builtin.debug:
        msg: >-
          {{ item.tags.Name | default(item.instance_id) }}
          ({{ item.instance_id }})
          — state: {{ item.state.name }}
          — type: {{ item.instance_type }}
          — ip: {{ item.public_ip_address | default('no public IP (stopped)') }}
      loop: "{{ ec2_info.instances | default([]) }}"
      loop_control:
        label: "{{ item.instance_id }}"

    # Main EC2 must be running; worker/vectorizer are expected stopped.
    # Anything else (terminated, shutting-down, impaired) is a failure.
    - name: Track unexpected EC2 states
      ansible.builtin.set_fact:
        local_failures: >-
          {{
            local_failures + ([
              item.tags.Name | default(item.instance_id) + ' (' + item.instance_id + ')'
              + ' is ' + item.state.name
              + (
                  ' — expected: running' if item.instance_id == ec2_main_id
                  else ' — expected: running or stopped'
                )
            ] if (
              (item.instance_id == ec2_main_id and item.state.name != 'running') or
              (item.instance_id != ec2_main_id and item.state.name not in ['running', 'stopped', 'pending', 'stopping'])
            ) else [])
          }}
      loop: "{{ ec2_info.instances | default([]) }}"
      loop_control:
        label: "{{ item.instance_id }}"

    - name: Ensure pymilvus is available for Zilliz health check
      ansible.builtin.pip:
        name: "pymilvus>=2.6.0,<2.7.0"
        virtualenv: "{{ playbook_dir }}/../.venv-health"
        virtualenv_command: python3 -m venv
        state: present

    - name: Check Zilliz Cloud connectivity via pymilvus
      ansible.builtin.command:
        argv:
          - "{{ playbook_dir }}/../.venv-health/bin/python3"
          - "-c"
          - |
            import os, sys
            from pymilvus import MilvusClient
            uri = os.environ.get('MILVUS_URI', '')
            token = os.environ.get('MILVUS_TOKEN', '')
            username = os.environ.get('MILVUS_USERNAME', '')
            password = os.environ.get('MILVUS_PASSWORD', '')
            if not uri:
                print('MILVUS_URI not set')
                sys.exit(1)
            try:
                kw = {'uri': uri}
                if token:
                    kw['token'] = token
                elif username and password:
                    kw['token'] = f'{username}:{password}'
                client = MilvusClient(**kw)
                cols = client.list_collections()
                print('Zilliz OK -- {} collections'.format(len(cols)))
                client.close()
            except Exception as e:
                print('Zilliz UNREACHABLE: {}'.format(e))
                sys.exit(1)
      environment:
        MILVUS_URI: "{{ milvus_uri }}"
        MILVUS_TOKEN: "{{ milvus_token | default('') }}"
        MILVUS_USERNAME: "{{ milvus_username | default('') }}"
        MILVUS_PASSWORD: "{{ milvus_password | default('') }}"
      register: zilliz_check
      failed_when: false
      changed_when: false
      no_log: true  # prevent token appearing in -v output

    - name: Zilliz status
      ansible.builtin.debug:
        msg: "{{ zilliz_check.stdout | default(zilliz_check.stderr) | default('check failed') }}"

    - name: Track Zilliz failure
      ansible.builtin.set_fact:
        local_failures: "{{ local_failures + ['Zilliz Cloud: ' + (zilliz_check.stdout | default(zilliz_check.stderr) | default('unreachable'))] }}"
      when: zilliz_check.rc | default(1) != 0

    # Add running worker to a dynamic group so Play 3 can SSH into it.
    # Stopped instances have no public IP — skip them gracefully.
    - name: Register running worker for live health check
      ansible.builtin.add_host:
        name: teleoscope-worker-live
        groups: workers_live
        ansible_host: "{{ item.public_ip_address }}"
        ansible_user: "{{ ansible_user }}"
        ansible_ssh_private_key_file: "{{ ssh_private_key_file }}"
      when:
        - item.instance_id == ec2_worker_instance
        - item.state.name == 'running'
        - item.public_ip_address is defined and item.public_ip_address != ''
      loop: "{{ ec2_info.instances | default([]) }}"
      loop_control:
        label: "{{ item.instance_id }}"

    - name: Register running vectorizer for live health check
      ansible.builtin.add_host:
        name: teleoscope-vectorizer-live
        groups: vectorizer_live
        ansible_host: "{{ item.public_ip_address }}"
        ansible_user: "{{ ansible_user }}"
        ansible_ssh_private_key_file: "{{ ssh_private_key_file }}"
      when:
        - item.instance_id == ec2_vectorize_instance
        - item.state.name == 'running'
        - item.public_ip_address is defined and item.public_ip_address != ''
      loop: "{{ ec2_info.instances | default([]) }}"
      loop_control:
        label: "{{ item.instance_id }}"


# ── PLAY 2: Main EC2 — containers, MongoDB, RabbitMQ, disk, nginx ─────────────
- name: Check main EC2 health
  hosts: main
  remote_user: "{{ ansible_user }}"
  gather_facts: false
  vars_files:
    - ./vars/vars.yaml
    - ./vars/infra-outputs.yaml

  tasks:
    - name: Initialize main failure list
      ansible.builtin.set_fact:
        main_play_failures: []

    - name: List all running containers with health status
      ansible.builtin.shell: |
        docker ps --format 'table {{ '{{' }}.Names{{ '}}' }}\t{{ '{{' }}.Status{{ '}}' }}\t{{ '{{' }}.Image{{ '}}' }}' 2>/dev/null
      register: containers
      become: true
      changed_when: false

    - name: Container status
      ansible.builtin.debug:
        var: containers.stdout_lines

    - name: Check for any unhealthy or exited containers
      ansible.builtin.shell: |
        UNHEALTHY=$(docker ps --filter health=unhealthy --format '{{ '{{' }}.Names{{ '}}' }}' 2>/dev/null)
        EXITED=$(docker ps -a --filter status=exited --format '{{ '{{' }}.Names{{ '}}' }}: exited {{ '{{' }}.Status{{ '}}' }}' 2>/dev/null | grep -v "mongodb-init" || true)
        if [ -n "$UNHEALTHY" ]; then echo "UNHEALTHY: $UNHEALTHY"; fi
        if [ -n "$EXITED" ]; then echo "EXITED: $EXITED"; fi
        if [ -z "$UNHEALTHY" ] && [ -z "$EXITED" ]; then echo "All containers healthy"; fi
      args:
        executable: /bin/bash
      register: container_issues
      become: true
      changed_when: false

    - name: Container issues summary
      ansible.builtin.debug:
        var: container_issues.stdout_lines

    - name: Track container failures
      ansible.builtin.set_fact:
        main_play_failures: "{{ main_play_failures + ['Main containers: ' + container_issues.stdout] }}"
      when: >-
        'UNHEALTHY' in (container_issues.stdout | default('')) or
        'EXITED' in (container_issues.stdout | default(''))

    - name: Check MongoDB — admin ping and replica set status
      ansible.builtin.shell: |
        PING=$(docker exec teleoscope-mongodb-1 \
          mongosh --host 127.0.0.1 \
          -u admin -p "{{ mongodb_admin_password }}" \
          --authenticationDatabase admin --quiet \
          --eval 'db.adminCommand({ping:1}).ok' 2>/dev/null)
        RS=$(docker exec teleoscope-mongodb-1 \
          mongosh --host 127.0.0.1 \
          -u admin -p "{{ mongodb_admin_password }}" \
          --authenticationDatabase admin --quiet \
          --eval 'rs.status().members[0].stateStr' 2>/dev/null)
        SIZE=$(docker exec teleoscope-mongodb-1 \
          mongosh --host 127.0.0.1 \
          -u admin -p "{{ mongodb_admin_password }}" \
          --authenticationDatabase admin --quiet \
          --eval 'db.getSiblingDB("teleoscope").stats().dataSize' 2>/dev/null)
        echo "ping=${PING}  replica_state=${RS}  data_size_bytes=${SIZE}"
      register: mongo_health
      become: true
      changed_when: false
      no_log: true  # password in command

    - name: MongoDB status
      ansible.builtin.debug:
        var: mongo_health.stdout_lines

    - name: Track MongoDB failure
      ansible.builtin.set_fact:
        main_play_failures: "{{ main_play_failures + ['MongoDB: ping failed — ' + (mongo_health.stdout | default('no output'))] }}"
      when: "'ping=1' not in (mongo_health.stdout | default(''))"

    - name: Check RabbitMQ — running state and queue depths
      ansible.builtin.shell: |
        RUNNING=$(docker exec teleoscope-rabbitmq-1 rabbitmq-diagnostics check_running 2>&1 | tail -1)
        QUEUES=$(docker exec teleoscope-rabbitmq-1 \
          rabbitmqctl list_queues name messages consumers 2>/dev/null | tail -n +2)
        echo "broker: $RUNNING"
        echo "---"
        echo "queue                          messages  consumers"
        echo "$QUEUES"
      register: rabbitmq_health
      become: true
      changed_when: false

    - name: RabbitMQ status
      ansible.builtin.debug:
        var: rabbitmq_health.stdout_lines

    - name: Track RabbitMQ failure
      ansible.builtin.set_fact:
        main_play_failures: "{{ main_play_failures + ['RabbitMQ: check_running failed (rc=' + (rabbitmq_health.rc | string) + ')'] }}"
      when: rabbitmq_health.rc | default(1) != 0

    - name: Check nginx — configuration and active connections
      ansible.builtin.shell: |
        nginx -t 2>&1 | tail -2
        echo "---"
        echo "Connections: $(ss -tn state established '( dport = :443 or dport = :80 )' | grep -c ESTAB || echo 0) active (HTTP/HTTPS)"
        systemctl is-active nginx
      register: nginx_health
      become: true
      changed_when: false

    - name: nginx status
      ansible.builtin.debug:
        var: nginx_health.stdout_lines

    - name: Track nginx failure
      ansible.builtin.set_fact:
        main_play_failures: "{{ main_play_failures + ['nginx: not active (systemctl reports: ' + (nginx_health.stdout_lines | default([]) | last | default('unknown')) + ')'] }}"
      when: "'active' not in (nginx_health.stdout_lines | default([]) | last | default(''))"

    - name: Check disk usage on /
      ansible.builtin.shell: |
        df -h / | tail -1
        echo "Docker disk usage:"
        docker system df 2>/dev/null
      register: disk_usage
      become: true
      changed_when: false

    - name: Disk usage
      ansible.builtin.debug:
        var: disk_usage.stdout_lines

    - name: Get disk usage percentage
      ansible.builtin.shell: df / | tail -1 | awk '{print $5}' | tr -d '%'
      register: disk_pct
      become: true
      changed_when: false

    - name: Track high disk usage
      ansible.builtin.set_fact:
        main_play_failures: "{{ main_play_failures + ['Disk: ' + disk_pct.stdout + '% used on / (threshold: 90%)'] }}"
      when: disk_pct.stdout | int > 90

    - name: Check monitor.py container logs (last 20 lines)
      ansible.builtin.shell: |
        docker logs --tail=20 teleoscope-monitor-1 2>&1 || echo "monitor container not running"
      register: monitor_logs
      become: true
      changed_when: false

    - name: monitor.py recent logs
      ansible.builtin.debug:
        var: monitor_logs.stdout_lines

    - name: Check TLS certificate expiry
      ansible.builtin.shell: |
        if [ -x /usr/bin/certbot ]; then
          certbot certificates 2>/dev/null \
            | grep -E "Domains|Expiry Date|VALID|INVALID" \
            || echo "certbot installed but no certs found"
        else
          echo "certbot not installed (run setup-tls.yaml first)"
        fi
      args:
        executable: /bin/bash
      register: tls_status
      become: true
      changed_when: false
      failed_when: false

    - name: TLS certificate status
      ansible.builtin.debug:
        var: tls_status.stdout_lines

    - name: Track TLS failure
      ansible.builtin.set_fact:
        main_play_failures: "{{ main_play_failures + ['TLS: certificate INVALID — run setup-tls.yaml or check certbot'] }}"
      when: "'INVALID' in (tls_status.stdout | default(''))"

    - name: Overall health summary
      ansible.builtin.debug:
        msg:
          - "══════════════════════════════════════════"
          - "  Teleoscope Health Report"
          - "══════════════════════════════════════════"
          - "  Main EC2:      {{ ec2_main_public_ip }}"
          - "  MongoDB:       {{ mongo_health.stdout | default('unknown') }}"
          - "  RabbitMQ:      {{ 'OK' if rabbitmq_health.rc == 0 else 'FAILED' }}"
          - "  nginx:         {{ nginx_health.stdout_lines[-1] | default('unknown') }}"
          - "  Zilliz Cloud:  {{ 'OK' if hostvars['localhost']['zilliz_check'].rc == 0 else 'UNREACHABLE' }}"
          - "  Containers:    {{ container_issues.stdout_lines[0] | default('unknown') }}"
          - "══════════════════════════════════════════"

    # Push this play's failures to localhost so the final summary can access them.
    - name: Export main failures to localhost
      ansible.builtin.set_fact:
        main_failures: "{{ main_play_failures }}"
      delegate_to: localhost
      delegate_facts: true
      run_once: true

# ── PLAY 3: Worker health (only when instance is running) ─────────────────────
# If the worker is stopped, no hosts were added to workers_live and this play
# prints "skipping: no hosts matched" — which is correct and expected.
- name: Check worker EC2 health (when running)
  hosts: workers_live
  remote_user: "{{ ansible_user }}"
  gather_facts: false
  ignore_unreachable: true
  vars_files:
    - ./vars/vars.yaml

  tasks:
    - name: Initialize worker failure list
      ansible.builtin.set_fact:
        worker_play_failures: []

    - name: Wait for SSH
      ansible.builtin.wait_for_connection:
        timeout: 30

    - name: Worker container status
      ansible.builtin.shell: |
        docker ps --format 'table {{ '{{' }}.Names{{ '}}' }}\t{{ '{{' }}.Status{{ '}}' }}\t{{ '{{' }}.Image{{ '}}' }}' 2>/dev/null
      register: worker_containers
      become: true
      changed_when: false

    - name: Worker containers
      ansible.builtin.debug:
        var: worker_containers.stdout_lines

    - name: Check for unhealthy worker containers
      ansible.builtin.shell: |
        UNHEALTHY=$(docker ps --filter health=unhealthy --format '{{ '{{' }}.Names{{ '}}' }}' 2>/dev/null)
        EXITED=$(docker ps -a --filter status=exited --format '{{ '{{' }}.Names{{ '}}' }}: {{ '{{' }}.Status{{ '}}' }}' 2>/dev/null || true)
        if [ -n "$UNHEALTHY" ]; then echo "UNHEALTHY: $UNHEALTHY"; fi
        if [ -n "$EXITED" ]; then echo "EXITED: $EXITED"; fi
        if [ -z "$UNHEALTHY" ] && [ -z "$EXITED" ]; then echo "All worker containers healthy"; fi
      args:
        executable: /bin/bash
      register: worker_issues
      become: true
      changed_when: false

    - name: Worker health summary
      ansible.builtin.debug:
        var: worker_issues.stdout_lines

    - name: Track worker container failures
      ansible.builtin.set_fact:
        worker_play_failures: "{{ worker_play_failures + ['Worker containers: ' + worker_issues.stdout] }}"
      when: >-
        'UNHEALTHY' in (worker_issues.stdout | default('')) or
        'EXITED' in (worker_issues.stdout | default(''))

    - name: Worker git commit
      ansible.builtin.command:
        cmd: git rev-parse --short HEAD
        chdir: "{{ remote_prefix }}/{{ ansible_user }}/Teleoscope"
      register: worker_sha
      changed_when: false

    - name: Worker code version
      ansible.builtin.debug:
        msg: "Worker code: {{ worker_sha.stdout }}"

    - name: Export worker failures to localhost
      ansible.builtin.set_fact:
        worker_failures: "{{ worker_play_failures }}"
      delegate_to: localhost
      delegate_facts: true
      run_once: true

# ── PLAY 4: Vectorizer health (only when instance is running) ─────────────────
- name: Check vectorizer EC2 health (when running)
  hosts: vectorizer_live
  remote_user: "{{ ansible_user }}"
  gather_facts: false
  ignore_unreachable: true
  vars_files:
    - ./vars/vars.yaml

  tasks:
    - name: Initialize vectorizer failure list
      ansible.builtin.set_fact:
        vec_play_failures: []

    - name: Wait for SSH
      ansible.builtin.wait_for_connection:
        timeout: 30

    - name: Vectorizer container status
      ansible.builtin.shell: |
        docker ps --format 'table {{ '{{' }}.Names{{ '}}' }}\t{{ '{{' }}.Status{{ '}}' }}\t{{ '{{' }}.Image{{ '}}' }}' 2>/dev/null
      register: vec_containers
      become: true
      changed_when: false

    - name: Vectorizer containers
      ansible.builtin.debug:
        var: vec_containers.stdout_lines

    - name: Check for unhealthy vectorizer containers
      ansible.builtin.shell: |
        UNHEALTHY=$(docker ps --filter health=unhealthy --format '{{ '{{' }}.Names{{ '}}' }}' 2>/dev/null)
        EXITED=$(docker ps -a --filter status=exited --format '{{ '{{' }}.Names{{ '}}' }}: {{ '{{' }}.Status{{ '}}' }}' 2>/dev/null || true)
        if [ -n "$UNHEALTHY" ]; then echo "UNHEALTHY: $UNHEALTHY"; fi
        if [ -n "$EXITED" ]; then echo "EXITED: $EXITED"; fi
        if [ -z "$UNHEALTHY" ] && [ -z "$EXITED" ]; then echo "All vectorizer containers healthy"; fi
      args:
        executable: /bin/bash
      register: vec_issues
      become: true
      changed_when: false

    - name: Vectorizer health summary
      ansible.builtin.debug:
        var: vec_issues.stdout_lines

    - name: Track vectorizer container failures
      ansible.builtin.set_fact:
        vec_play_failures: "{{ vec_play_failures + ['Vectorizer containers: ' + vec_issues.stdout] }}"
      when: >-
        'UNHEALTHY' in (vec_issues.stdout | default('')) or
        'EXITED' in (vec_issues.stdout | default(''))

    - name: Vectorizer git commit
      ansible.builtin.command:
        cmd: git rev-parse --short HEAD
        chdir: "{{ remote_prefix }}/{{ ansible_user }}/Teleoscope"
      register: vec_sha
      changed_when: false

    - name: Vectorizer code version
      ansible.builtin.debug:
        msg: "Vectorizer code: {{ vec_sha.stdout }}"

    - name: Export vectorizer failures to localhost
      ansible.builtin.set_fact:
        vec_failures: "{{ vec_play_failures }}"
      delegate_to: localhost
      delegate_facts: true
      run_once: true

# ── PLAY 5: Failure summary — printed in RED if anything failed ───────────────
# This play always runs. All individual checks above use failed_when: false so
# the full report is always printed. Failures are aggregated here and surfaced
# via ansible.builtin.fail (red output, non-zero exit code) if any exist.
- name: Health check failure summary
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Aggregate all failures from every play
      ansible.builtin.set_fact:
        all_failures: >-
          {{
            (local_failures | default([])) +
            (main_failures | default([])) +
            (worker_failures | default([])) +
            (vec_failures | default([]))
          }}

    - name: Health check complete — all checks passed
      ansible.builtin.debug:
        msg: "✓ All health checks passed."
      when: all_failures | length == 0

    - name: FAILURE SUMMARY
      ansible.builtin.fail:
        msg: |
          ╔══ HEALTH CHECK FAILURES ({{ all_failures | length }}) ═══════════════════════════════════╗
          {% for item in all_failures %}
            ✗  {{ item }}
          {% endfor %}
          ╚════════════════════════════════════════════════════════════════════════════╝
      when: all_failures | length > 0

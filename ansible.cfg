[defaults]
# Don't prompt to accept new EC2 host keys — instances are provisioned fresh
# by site.yaml so there's no risk of MITM on first connect.
host_key_checking = False

# Suppress deprecation noise from amazon.aws collection.
deprecation_warnings = False

# Retry files clutter the repo; disable them.
retry_files_enabled = False

[ssh_connection]
# Speeds up connections by reusing the SSH socket across tasks.
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no

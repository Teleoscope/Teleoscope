# Teleoscope - Docker Compose stack
# Quick start: cp .env.example .env && docker compose up -d
# App: http://localhost:3000

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    entrypoint: >
      bash -c '
        openssl rand -base64 756 > /tmp/mongo-keyfile
        chmod 400 /tmp/mongo-keyfile
        chown 999:999 /tmp/mongo-keyfile
        exec docker-entrypoint.sh mongod --replSet rs0 --keyFile /tmp/mongo-keyfile
      '
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ADMIN_PASSWORD:-admin_password}
      MONGO_INITDB_DATABASE: teleoscope
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    # Ping only: replica set is initialized by mongodb-init. Requiring PRIMARY here caused a deadlock
    # (unhealthy until rs.initiate, while operators waited on health).
    # Root user is in `admin` — always pass --authenticationDatabase admin.
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          mongosh --host 127.0.0.1 -u admin
          -p "$$MONGO_INITDB_ROOT_PASSWORD"
          --authenticationDatabase admin --quiet
          --eval 'var r = db.adminCommand({ ping: 1 }); quit((r && (r.ok === 1 || r.ok === true)) ? 0 : 1);'
      interval: 5s
      timeout: 15s
      retries: 30
      start_period: 180s

  # One-shot: rs.initiate (app and transactions need a replica set).
  # MUST run after mongodb is healthy: admin user only exists after entrypoint initdb finishes; with
  # service_started alone, this container raced mongod and burned the whole wait loop on auth failure.
  mongodb-init:
    image: mongo:7
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"
    environment:
      MONGODB_ADMIN_PASSWORD: ${MONGODB_ADMIN_PASSWORD:-admin_password}
      # MONGODB_RS_HOST controls the replica set member hostname advertised to clients.
      # Default 'mongodb' works inside Docker (inter-container DNS).
      # For external / SSH-tunnel inspection set this to the host's IP or hostname so
      # MongoDB Compass / mongosh can resolve it:
      #   MONGODB_RS_HOST=<server-ip>  # e.g. 1.2.3.4 or my-server.example.com
      # When connecting via SSH tunnel use directConnection=true instead:
      #   mongodb://admin:<pw>@localhost:27017/admin?authSource=admin&directConnection=true
      MONGODB_RS_HOST: ${MONGODB_RS_HOST:-mongodb}
    entrypoint: ["/bin/bash", "-eu", "-c"]
    command:
      - |
        echo "mongodb-init: ensuring replica set rs0 (Mongo already passed health: admin ping)..."
        RS_HOST="${MONGODB_RS_HOST:-mongodb}"
        mongosh --host mongodb --username admin --password "$MONGODB_ADMIN_PASSWORD" --authenticationDatabase admin --quiet --eval "
          try {
            var s = rs.status();
            var cur = s.members[0].name;
            var want = '${RS_HOST}:27017';
            if (cur !== want) {
              print('mongodb-init: reconfiguring RS member from ' + cur + ' to ' + want);
              var cfg = rs.conf();
              cfg.members[0].host = want;
              rs.reconfig(cfg, { force: true });
            }
            quit(0);
          } catch (e) {
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: '${RS_HOST}:27017' }] });
            quit(0);
          }
        "
        echo "mongodb-init: done"

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      # Activates rabbitmq_web_stomp so the nginx /ws proxy works.
      # rabbitmq:3-management ships the plugin; it just needs to be listed here.
      - ./docker/rabbitmq-enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI
      - "15674:15674"   # WebStomp (real-time workspace updates via nginx /ws)
    healthcheck:
      # check_port_connectivity verifies the broker actually accepts connections,
      # not just that the process is running — catches hung-but-alive brokers.
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Keep in sync with pymilvus major.minor in backend/requirements.txt (2.6.x).
  # Upgrading from older Milvus: existing milvus/etcd/minio volumes may be incompatible —
  # for local dev, `docker compose down -v` then re-seed is usually simplest.
  milvus:
    image: milvusdb/milvus:v2.6.11
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      # Default host port 19530 so host-run scripts (seed, demo-status) use http://localhost:19530 without discovery.
      # Set MILVUS_HOST_PORT=0 for a random free port (then milvus_docker_uri.sh queries docker compose port).
      - "${MILVUS_HOST_PORT:-19530}:19530"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - milvus_data:/var/lib/milvus

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: 1000
      ETCD_QUOTA_BACKEND_BYTES: 4294967296
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    restart: unless-stopped
    command: minio server /minio_data --console-address ":9001"
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://teleoscope:${MONGODB_PASSWORD:-teleoscope_dev_password}@mongodb:27017/teleoscope?directConnection=true&serverSelectionTimeoutMS=2000&authSource=admin
      MONGODB_DATABASE: teleoscope
      MONGODB_USERNAME: teleoscope
      MONGODB_REGISTRAR_URI: mongodb://teleoscope:${MONGODB_PASSWORD:-teleoscope_dev_password}@mongodb:27017/teleoscope?directConnection=true&serverSelectionTimeoutMS=2000&authSource=admin
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-teleoscope_dev_password}
      MONGODB_HOST: mongodb
      MONGODB_OPTIONS: directConnection=true&serverSelectionTimeoutMS=2000&authSource=admin
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_VHOST: /
      RABBITMQ_DISPATCH_QUEUE: teleoscope-dispatch
      RABBITMQ_QUEUE: teleoscope-dispatch
      TELEOSCOPE_BASE_URL: ${TELEOSCOPE_BASE_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-in-production}
      UPLOAD_DIR: /tmp/teleoscope/uploads
      # Proxied by the app so open workspaces wake the vectorizer (see VECTORIZER_CONTROL_* on vectorizer).
      VECTORIZER_CONTROL_URL: ${VECTORIZER_CONTROL_URL:-http://vectorizer:8765}
      VECTORIZER_CONTROL_TOKEN: ${VECTORIZER_CONTROL_TOKEN:-}
    env_file:
      - .env
    volumes:
      - teleoscope_uploads:/tmp/teleoscope/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      mongodb-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  # Celery worker - main task queue
  worker-tasks:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: ["python", "-m", "celery", "-A", "backend.tasks", "worker", "--loglevel=info", "-Q", "teleoscope-tasks"]
    environment:
      C_FORCE_ROOT: 1
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_VHOST: /
      RABBITMQ_TASK_QUEUE: teleoscope-tasks
      MONGODB_USERNAME: teleoscope
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-teleoscope_dev_password}
      MONGODB_HOST: mongodb
      MONGODB_OPTIONS: directConnection=true&serverSelectionTimeoutMS=2000&authSource=admin
      DOWNLOAD_DIR: /tmp/teleoscope/downloads
      MILVUS_URI: ${MILVUS_DOCKER_URI:-http://milvus:19530}
      MILVUS_DBNAME: teleoscope
      RABBITMQ_DISPATCH_QUEUE: teleoscope-dispatch
      RABBITMQ_VECTORIZE_QUEUE: teleoscope-vectorize
      RABBITMQ_UPLOAD_VECTOR_QUEUE: teleoscope-upload-vector
    volumes:
      - teleoscope_downloads:/tmp/teleoscope/downloads
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - mongodb
      - milvus

  # Dispatch - routes incoming messages to Celery tasks
  dispatch:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: ["python", "-m", "backend.dispatch"]
    environment:
      C_FORCE_ROOT: 1
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_VHOST: /
      RABBITMQ_TASK_QUEUE: teleoscope-tasks
      RABBITMQ_DISPATCH_QUEUE: teleoscope-dispatch
    env_file:
      - .env
    depends_on:
      - rabbitmq

  # Graph worker - UMAP, HDBSCAN, vector ops
  worker-graph:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: ["python", "-m", "celery", "-A", "backend.graph", "worker", "--loglevel=info", "-Q", "graph"]
    environment:
      C_FORCE_ROOT: 1
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_VHOST: /
      RABBITMQ_TASK_QUEUE: teleoscope-tasks
      RABBITMQ_VECTORIZE_QUEUE: teleoscope-vectorize
      RABBITMQ_UPLOAD_VECTOR_QUEUE: teleoscope-upload-vector
      MONGODB_USERNAME: teleoscope
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-teleoscope_dev_password}
      MONGODB_HOST: mongodb
      MONGODB_OPTIONS: directConnection=true&serverSelectionTimeoutMS=2000&authSource=admin
      MILVUS_URI: ${MILVUS_DOCKER_URI:-http://milvus:19530}
      MILVUS_DBNAME: teleoscope
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - mongodb
      - milvus

  # Vectorizer - BGEM3 embeddings
  vectorizer:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PREWARM_BGE_M3: "1"
    restart: unless-stopped
    command: ["python", "-m", "backend.vectorizer"]
    ports:
      - "8765:8765"
    environment:
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_VHOST: /
      RABBITMQ_VECTORIZE_QUEUE: teleoscope-vectorize
      RABBITMQ_UPLOAD_VECTOR_QUEUE: teleoscope-upload-vector
      VECTORIZER_CONTROL_HOST: ${VECTORIZER_CONTROL_HOST:-0.0.0.0}
      VECTORIZER_CONTROL_PORT: ${VECTORIZER_CONTROL_PORT:-8765}
      VECTORIZER_IDLE_SECONDS: ${VECTORIZER_IDLE_SECONDS:-300}
      VECTORIZER_CONTROL_TOKEN: ${VECTORIZER_CONTROL_TOKEN:-}
      VECTORIZER_ALWAYS_ON: ${VECTORIZER_ALWAYS_ON:-}
    env_file:
      - .env
    depends_on:
      - rabbitmq

  # Uploader - writes vectors to Milvus
  uploader:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: ["python", "-m", "backend.uploader"]
    environment:
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_VHOST: /
      RABBITMQ_TASK_QUEUE: teleoscope-tasks
      RABBITMQ_DISPATCH_QUEUE: teleoscope-dispatch
      RABBITMQ_VECTORIZE_QUEUE: teleoscope-vectorize
      RABBITMQ_UPLOAD_VECTOR_QUEUE: teleoscope-upload-vector
      MILVUS_URI: ${MILVUS_DOCKER_URI:-http://milvus:19530}
      MILVUS_DBNAME: teleoscope
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - milvus

  # Files API - FastAPI for file downloads
  files:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: ["gunicorn", "-w", "2", "-k", "uvicorn.workers.UvicornWorker", "files:app", "--bind", "0.0.0.0:8000"]
    working_dir: /app/backend
    ports:
      - "8000:8000"
    environment:
      DOWNLOAD_DIR: /tmp/teleoscope/downloads
    volumes:
      - teleoscope_downloads:/tmp/teleoscope/downloads

  # Monitor - EC2 auto-scaling (optional, requires AWS credentials)
  # Uncomment and set EC2_VECTORIZE_INSTANCE, EC2_VECTORDB_INSTANCE for cloud deploy
  # monitor:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.backend
  #   command: ["python", "-m", "backend.monitor"]
  #   environment:
  #     RABBITMQ_VECTORIZE_QUEUE: teleoscope-vectorize
  #     RABBITMQ_VHOST: /
  #     EC2_VECTORIZE_INSTANCE: ${EC2_VECTORIZE_INSTANCE}
  #     EC2_VECTORDB_INSTANCE: ${EC2_VECTORDB_INSTANCE}
  #   env_file: .env
  #   depends_on: [rabbitmq]

volumes:
  mongodb_data:
  milvus_data:
  etcd_data:
  minio_data:
  teleoscope_downloads:
  teleoscope_uploads:

# Teleoscope - Docker Compose stack
# Quick start: cp .env.example .env && docker compose up -d
# App: http://localhost:3000

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    entrypoint: >
      bash -c '
        openssl rand -base64 756 > /tmp/mongo-keyfile
        chmod 400 /tmp/mongo-keyfile
        chown 999:999 /tmp/mongo-keyfile
        exec docker-entrypoint.sh mongod --replSet rs0 --keyFile /tmp/mongo-keyfile
      '
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin_password
      MONGO_INITDB_DATABASE: teleoscope
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "-u", "admin", "-p", "admin_password", "--eval", "try { rs.status().ok } catch(e) { 0 }"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # One-shot: initializes the replica set on first start
  mongodb-init:
    image: mongo:7
    depends_on:
      mongodb:
        condition: service_started
    restart: "no"
    entrypoint: >
      bash -c '
        echo "Waiting for MongoDB to accept connections..."
        for i in $$(seq 1 30); do
          if mongosh --host mongodb -u admin -p admin_password --quiet --eval "db.adminCommand({ping:1})" 2>/dev/null; then
            break
          fi
          sleep 2
        done
        echo "Initiating replica set..."
        mongosh --host mongodb -u admin -p admin_password --eval "
          try {
            var status = rs.status();
            print(\"Replica set already initialized: \" + status.set);
          } catch(e) {
            rs.initiate({ _id: \"rs0\", members: [{ _id: 0, host: \"mongodb:27017\" }] });
            print(\"Replica set initiated.\");
          }
        "
      '

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  milvus:
    image: milvusdb/milvus:v2.3.3
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      # Use an ephemeral host port by default to avoid startup failures when 19530 is already in use.
      # Set MILVUS_HOST_PORT explicitly in .env when you need a fixed host port.
      - "${MILVUS_HOST_PORT:-0}:19530"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - milvus_data:/var/lib/milvus

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: 1000
      ETCD_QUOTA_BACKEND_BYTES: 4294967296
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    restart: unless-stopped
    command: minio server /minio_data --console-address ":9001"
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://teleoscope:${MONGODB_PASSWORD:-teleoscope_dev_password}@mongodb:27017/teleoscope?directConnection=true&serverSelectionTimeoutMS=2000&authSource=admin
      MONGODB_DATABASE: teleoscope
      MONGODB_USERNAME: teleoscope
      MONGODB_REGISTRAR_URI: mongodb://teleoscope:${MONGODB_PASSWORD:-teleoscope_dev_password}@mongodb:27017/teleoscope?directConnection=true&serverSelectionTimeoutMS=2000&authSource=admin
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-teleoscope_dev_password}
      MONGODB_HOST: mongodb
      MONGODB_OPTIONS: directConnection=true&serverSelectionTimeoutMS=2000&authSource=admin
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_VHOST: /
      RABBITMQ_QUEUE: teleoscope-dispatch
      TELEOSCOPE_BASE_URL: ${TELEOSCOPE_BASE_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-in-production}
      UPLOAD_DIR: /tmp/teleoscope/uploads
      # Proxied by the app so open workspaces wake the vectorizer (see VECTORIZER_CONTROL_* on vectorizer).
      VECTORIZER_CONTROL_URL: ${VECTORIZER_CONTROL_URL:-http://vectorizer:8765}
      VECTORIZER_CONTROL_TOKEN: ${VECTORIZER_CONTROL_TOKEN:-}
    env_file:
      - .env
    volumes:
      - teleoscope_uploads:/tmp/teleoscope/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      mongodb-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      vectorizer:
        condition: service_started

  # Celery worker - main task queue
  worker-tasks:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: ["python", "-m", "celery", "-A", "backend.tasks", "worker", "--loglevel=info", "-Q", "teleoscope-tasks"]
    environment:
      C_FORCE_ROOT: 1
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_VHOST: /
      RABBITMQ_TASK_QUEUE: teleoscope-tasks
      MONGODB_USERNAME: teleoscope
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-teleoscope_dev_password}
      MONGODB_HOST: mongodb
      MONGODB_OPTIONS: directConnection=true&serverSelectionTimeoutMS=2000&authSource=admin
      DOWNLOAD_DIR: /tmp/teleoscope/downloads
      MILVUS_HOST: milvus
      MIVLUS_PORT: 19530
      MILVUS_DBNAME: teleoscope
      RABBITMQ_DISPATCH_QUEUE: teleoscope-dispatch
      RABBITMQ_VECTORIZE_QUEUE: teleoscope-vectorize
      RABBITMQ_UPLOAD_VECTOR_QUEUE: teleoscope-upload-vector
    volumes:
      - teleoscope_downloads:/tmp/teleoscope/downloads
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - mongodb
      - milvus

  # Dispatch - routes incoming messages to Celery tasks
  dispatch:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: ["python", "-m", "backend.dispatch"]
    environment:
      C_FORCE_ROOT: 1
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_VHOST: /
      RABBITMQ_TASK_QUEUE: teleoscope-tasks
      RABBITMQ_DISPATCH_QUEUE: teleoscope-dispatch
    env_file:
      - .env
    depends_on:
      - rabbitmq

  # Graph worker - UMAP, HDBSCAN, vector ops
  worker-graph:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: ["python", "-m", "celery", "-A", "backend.graph", "worker", "--loglevel=info", "-Q", "graph"]
    environment:
      C_FORCE_ROOT: 1
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_VHOST: /
      RABBITMQ_TASK_QUEUE: teleoscope-tasks
      RABBITMQ_VECTORIZE_QUEUE: teleoscope-vectorize
      RABBITMQ_UPLOAD_VECTOR_QUEUE: teleoscope-upload-vector
      MONGODB_USERNAME: teleoscope
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-teleoscope_dev_password}
      MONGODB_HOST: mongodb
      MONGODB_OPTIONS: directConnection=true&serverSelectionTimeoutMS=2000&authSource=admin
      MILVUS_HOST: milvus
      MIVLUS_PORT: 19530
      MILVUS_DBNAME: teleoscope
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - mongodb
      - milvus

  # Vectorizer - BGEM3 embeddings
  vectorizer:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PREWARM_BGE_M3: "1"
    restart: unless-stopped
    command: ["python", "-m", "backend.vectorizer"]
    ports:
      - "8765:8765"
    environment:
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_VHOST: /
      RABBITMQ_VECTORIZE_QUEUE: teleoscope-vectorize
      RABBITMQ_UPLOAD_VECTOR_QUEUE: teleoscope-upload-vector
      VECTORIZER_CONTROL_HOST: ${VECTORIZER_CONTROL_HOST:-0.0.0.0}
      VECTORIZER_CONTROL_PORT: ${VECTORIZER_CONTROL_PORT:-8765}
      VECTORIZER_IDLE_SECONDS: ${VECTORIZER_IDLE_SECONDS:-300}
      VECTORIZER_CONTROL_TOKEN: ${VECTORIZER_CONTROL_TOKEN:-}
      VECTORIZER_ALWAYS_ON: ${VECTORIZER_ALWAYS_ON:-}
    env_file:
      - .env
    depends_on:
      - rabbitmq

  # Uploader - writes vectors to Milvus
  uploader:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: ["python", "-m", "backend.uploader"]
    environment:
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_VHOST: /
      RABBITMQ_TASK_QUEUE: teleoscope-tasks
      RABBITMQ_DISPATCH_QUEUE: teleoscope-dispatch
      RABBITMQ_VECTORIZE_QUEUE: teleoscope-vectorize
      RABBITMQ_UPLOAD_VECTOR_QUEUE: teleoscope-upload-vector
      MILVUS_HOST: milvus
      MIVLUS_PORT: 19530
      MILVUS_DBNAME: teleoscope
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - milvus

  # Files API - FastAPI for file downloads
  files:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: ["gunicorn", "-w", "2", "-k", "uvicorn.workers.UvicornWorker", "files:app", "--bind", "0.0.0.0:8000"]
    working_dir: /app/backend
    ports:
      - "8000:8000"
    environment:
      DOWNLOAD_DIR: /tmp/teleoscope/downloads
    volumes:
      - teleoscope_downloads:/tmp/teleoscope/downloads

  # Monitor - EC2 auto-scaling (optional, requires AWS credentials)
  # Uncomment and set EC2_VECTORIZE_INSTANCE, EC2_VECTORDB_INSTANCE for cloud deploy
  # monitor:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.backend
  #   command: ["python", "-m", "backend.monitor"]
  #   environment:
  #     RABBITMQ_VECTORIZE_QUEUE: teleoscope-vectorize
  #     RABBITMQ_VHOST: /
  #     EC2_VECTORIZE_INSTANCE: ${EC2_VECTORIZE_INSTANCE}
  #     EC2_VECTORDB_INSTANCE: ${EC2_VECTORDB_INSTANCE}
  #   env_file: .env
  #   depends_on: [rabbitmq]

volumes:
  mongodb_data:
  milvus_data:
  etcd_data:
  minio_data:
  teleoscope_downloads:
  teleoscope_uploads:

name: teleoscope
channels:
  - conda-forge
  - defaults
dependencies:
  # Toolchain for local no-Docker workflows
  - python=3.11
  - nodejs>=22,<23
  - pnpm>=10,<11
  - pip

  # Backend runtime + test dependencies (kept in sync with backend/requirements.txt
  # and requirements-test.txt for a full local stack)
  - pip:
      - celery>=5.3.0
      - python-dotenv>=1.0.0
      - pymongo>=4.16.0
      - pika>=1.3.0
      - kombu>=5.3.0
      - FlagEmbedding>=1.2.0,<1.3.0
      - sentence-transformers>=5.2.3
      - transformers>=4.33.0,<4.46.0
      - peft>=0.7.0
      - torch>=2.0.0
      - pymilvus>=2.3.0
      - pandas>=2.0.0
      - python-docx>=1.2.0
      - openpyxl>=3.1.0
      - xlsxwriter>=3.1.0
      - umap-learn>=0.5.0
      - hdbscan>=0.8.0
      - numpy>=1.24.0
      - scipy>=1.11.0
      - zstandard>=0.21.0
      - fastapi>=0.109.0
      - uvicorn[standard]>=0.27.0
      - gunicorn>=21.0.0
      - tqdm>=4.66.0
      - ujson>=5.9.0
      - bcrypt>=4.1.0
      - random_object_id>=0.3.0
      - boto3>=1.34.0
      - pytest>=7.0.0
      - pytest-cov>=4.0.0
      - pyyaml>=6.0.0
      - httpx>=0.28.1

name: Playwright UI System E2E

on:
  push:
    branches: ["main", "frontend"]
  pull_request:
    branches: ["main", "frontend"]
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

jobs:
  ui-core-e2e:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      COMPOSE_PROJECT_NAME: teleoscope

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache pnpm store
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_ENV
        working-directory: teleoscope.ca

      - name: Restore pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('teleoscope.ca/pnpm-lock.yaml') }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: teleoscope.ca

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps
        working-directory: teleoscope.ca

      - name: Ensure root .env exists
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env
          fi
          grep -q '^VECTORIZER_ALWAYS_ON=' .env || echo 'VECTORIZER_ALWAYS_ON=1' >> .env

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build stack images (cached)
        run: |
          docker buildx build \
            --file Dockerfile.app \
            --tag teleoscope-app \
            --cache-from type=gha,scope=playwright-app \
            --cache-to type=gha,scope=playwright-app,mode=max \
            --load \
            .

          docker buildx build \
            --file Dockerfile.backend \
            --build-arg PREWARM_BGE_M3=0 \
            --tag teleoscope-backend \
            --cache-from type=gha,scope=playwright-backend \
            --cache-to type=gha,scope=playwright-backend,mode=max \
            --load \
            .

          docker buildx build \
            --file Dockerfile.backend \
            --build-arg PREWARM_BGE_M3=1 \
            --tag teleoscope-vectorizer \
            --cache-from type=gha,scope=playwright-vectorizer \
            --cache-to type=gha,scope=playwright-vectorizer,mode=max \
            --load \
            .

          for svc in dispatch files uploader worker-graph worker-tasks; do
            docker tag teleoscope-backend "teleoscope-${svc}"
          done

      - name: Start full stack
        run: docker compose up -d --no-build

      - name: Wait for stack readiness
        run: ./scripts/test-stack.sh http://localhost:3000

      - name: Run UI component/export/uploader/demo/information-flow/workflow e2e
        run: pnpm exec playwright test tests/sidebar-components-e2e.spec.ts tests/export-buttons-ui.spec.ts tests/csv-uploader-ui.spec.ts tests/demo-public.spec.ts tests/ui-information-flow.spec.ts tests/workflow-cicd-sample-data.spec.ts --project=chromium --workers=2 --retries=1 --max-failures=1 --reporter=line
        working-directory: teleoscope.ca
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: "http://localhost:3000"
          PLAYWRIGHT_SKIP_ACCOUNT: "1"
          PLAYWRIGHT_UI_COMPONENT_E2E: "1"
          PLAYWRIGHT_UI_EXPORT_E2E: "1"
          PLAYWRIGHT_UI_UPLOADER_E2E: "1"
          PLAYWRIGHT_UI_INFORMATION_E2E: "1"
          PLAYWRIGHT_UI_SAMPLE_DOC_COUNT: "10"
          PLAYWRIGHT_UI_INFORMATION_DOC_COUNT: "10"
          PLAYWRIGHT_UI_INFORMATION_TIMEOUT_MS: "900000"
          PLAYWRIGHT_WORKFLOW_CICD_E2E: "1"
          PLAYWRIGHT_WORKFLOW_DOC_COUNT: "10"
          PLAYWRIGHT_WORKFLOW_RESULT_TIMEOUT_MS: "720000"

      - name: Demo API load test (CI smoke)
        run: node scripts/load-test-demo.mjs http://localhost:3000 250 15

      - name: Upload Playwright report (core)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ui-core
          path: teleoscope.ca/playwright-report/
          retention-days: 14

  ui-vectorization-full-e2e:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      COMPOSE_PROJECT_NAME: teleoscope

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache pnpm store
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_ENV
        working-directory: teleoscope.ca

      - name: Restore pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('teleoscope.ca/pnpm-lock.yaml') }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: teleoscope.ca

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps
        working-directory: teleoscope.ca

      - name: Ensure root .env exists
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env
          fi
          grep -q '^VECTORIZER_ALWAYS_ON=' .env || echo 'VECTORIZER_ALWAYS_ON=1' >> .env

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build stack images (cached)
        run: |
          docker buildx build \
            --file Dockerfile.app \
            --tag teleoscope-app \
            --cache-from type=gha,scope=playwright-app \
            --cache-to type=gha,scope=playwright-app,mode=max \
            --load \
            .

          docker buildx build \
            --file Dockerfile.backend \
            --build-arg PREWARM_BGE_M3=0 \
            --tag teleoscope-backend \
            --cache-from type=gha,scope=playwright-backend \
            --cache-to type=gha,scope=playwright-backend,mode=max \
            --load \
            .

          docker buildx build \
            --file Dockerfile.backend \
            --build-arg PREWARM_BGE_M3=1 \
            --tag teleoscope-vectorizer \
            --cache-from type=gha,scope=playwright-vectorizer \
            --cache-to type=gha,scope=playwright-vectorizer,mode=max \
            --load \
            .

          for svc in dispatch files uploader worker-graph worker-tasks; do
            docker tag teleoscope-backend "teleoscope-${svc}"
          done

      - name: Start full stack
        run: docker compose up -d --no-build

      - name: Wait for stack readiness
        run: ./scripts/test-stack.sh http://localhost:3000

      - name: Run UI vectorization e2e (10 docs)
        run: pnpm exec playwright test tests/ui-vectorization-large.spec.ts --project=chromium --retries=1 --reporter=line
        working-directory: teleoscope.ca
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: "http://localhost:3000"
          PLAYWRIGHT_SKIP_ACCOUNT: "1"
          PLAYWRIGHT_UI_VECTOR_E2E: "1"
          PLAYWRIGHT_UI_VECTOR_DOC_COUNT: "10"
          PLAYWRIGHT_VECTOR_RESULT_TIMEOUT_MS: "300000"

      - name: Run UI vectorization e2e (100 docs)
        run: pnpm exec playwright test tests/ui-vectorization-large.spec.ts --project=chromium --retries=1 --reporter=line
        working-directory: teleoscope.ca
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: "http://localhost:3000"
          PLAYWRIGHT_SKIP_ACCOUNT: "1"
          PLAYWRIGHT_UI_VECTOR_E2E: "1"
          PLAYWRIGHT_UI_VECTOR_DOC_COUNT: "100"
          PLAYWRIGHT_VECTOR_RESULT_TIMEOUT_MS: "600000"

      - name: Run UI vectorization e2e (1000 docs)
        run: pnpm exec playwright test tests/ui-vectorization-large.spec.ts --project=chromium --retries=1 --reporter=line
        working-directory: teleoscope.ca
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: "http://localhost:3000"
          PLAYWRIGHT_SKIP_ACCOUNT: "1"
          PLAYWRIGHT_UI_VECTOR_E2E: "1"
          PLAYWRIGHT_UI_VECTOR_DOC_COUNT: "1000"
          PLAYWRIGHT_VECTOR_RESULT_TIMEOUT_MS: "900000"

      - name: Run full workflow e2e (100 docs)
        run: pnpm exec playwright test tests/workflow-cicd-sample-data.spec.ts --project=chromium --retries=1 --reporter=line
        working-directory: teleoscope.ca
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: "http://localhost:3000"
          PLAYWRIGHT_SKIP_ACCOUNT: "1"
          PLAYWRIGHT_WORKFLOW_CICD_E2E: "1"
          PLAYWRIGHT_WORKFLOW_DOC_COUNT: "100"
          PLAYWRIGHT_WORKFLOW_RESULT_TIMEOUT_MS: "720000"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ui-vectorization-full
          path: teleoscope.ca/playwright-report/
          retention-days: 14

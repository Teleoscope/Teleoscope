name: Playwright UI Vector E2E

on:
  push:
    branches: ["main", "frontend"]
  pull_request:
    branches: ["main", "frontend"]

jobs:
  ui-vectorization-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache pnpm store
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_ENV
        working-directory: teleoscope.ca

      - name: Restore pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('teleoscope.ca/pnpm-lock.yaml') }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: teleoscope.ca

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps
        working-directory: teleoscope.ca

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for stack readiness
        run: ./scripts/test-stack.sh http://localhost:3000

      - name: Run large UI vectorization e2e
        run: pnpm exec playwright test tests/ui-vectorization-large.spec.ts --project=chromium --retries=0 --reporter=line
        working-directory: teleoscope.ca
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: "http://localhost:3000"
          PLAYWRIGHT_SKIP_ACCOUNT: "1"
          PLAYWRIGHT_UI_VECTOR_E2E: "1"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ui-vectorization
          path: teleoscope.ca/playwright-report/
          retention-days: 14

# Single test suite: must pass on every push/PR to main.
# Guarantees backend unit tests and frontend e2e (Chromium) pass.
name: Test suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt', 'requirements-test.txt') }}

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
          pip install pyyaml celery python-dotenv 'pymongo>=4.0.0' pika kombu 'pymilvus>=2.6.0,<2.7.0' pandas python-docx openpyxl xlsxwriter umap-learn hdbscan numpy scipy zstandard fastapi 'uvicorn[standard]' gunicorn tqdm ujson bcrypt random_object_id joblib

      - name: Run unit tests
        run: |
          PYTHONPATH=. python -m pytest tests/ -m "not integration and not e2e" -v --tb=short
        env:
          CI: true

  frontend:
    name: Frontend (e2e)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: teleoscope.ca
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Python (for schema generation)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('teleoscope.ca/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: List API endpoints
        run: node ../scripts/list-api-endpoints.mjs

      - name: Run frontend modular tests (Vitest)
        run: pnpm exec vitest run --config vitest.config.ts

      - name: Generate schemas
        run: python loadschemas.py

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Start MongoDB replica set (CI local fallback)
        run: |
          docker rm -f teleoscope-mongodb-ci 2>/dev/null || true
          docker run -d --name teleoscope-mongodb-ci \
            -p 27017:27017 \
            -e MONGO_INITDB_ROOT_USERNAME=admin \
            -e MONGO_INITDB_ROOT_PASSWORD=admin_password \
            -e MONGO_INITDB_DATABASE=teleoscope \
            -v "${{ github.workspace }}/docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro" \
            mongo:7 bash -c "openssl rand -base64 756 > /tmp/keyfile && chmod 400 /tmp/keyfile && chown 999:999 /tmp/keyfile && exec docker-entrypoint.sh mongod --replSet rs0 --keyFile /tmp/keyfile"

          for i in $(seq 1 30); do
            if docker exec teleoscope-mongodb-ci mongosh -u admin -p admin_password --quiet --eval "db.adminCommand({ ping: 1 }).ok" >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          docker exec teleoscope-mongodb-ci mongosh -u admin -p admin_password --eval "try { rs.status(); } catch (e) { rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'localhost:27017'}]}); }"

      - name: E2E env
        run: |
          touch .env.local
          echo "MONGODB_URI=mongodb://admin:admin_password@localhost:27017/teleoscope?authSource=admin&replicaSet=rs0&directConnection=true" >> .env.local
          echo "PLAYWRIGHT_E2E=1" >> .env.local
          echo "MONGODB_HOST=localhost" >> .env.local
          echo "TELEOSCOPE_BASE_URL=http://127.0.0.1:3099" >> .env.local

      - name: Run Playwright (Chromium)
        run: pnpm exec playwright test --project=chromium
        env:
          CI: true
          PLAYWRIGHT_E2E: "1"
          PLAYWRIGHT_SKIP_ACCOUNT: "1"
          MONGODB_URI: mongodb://admin:admin_password@localhost:27017/teleoscope?authSource=admin&replicaSet=rs0&directConnection=true
          MONGODB_HOST: localhost
          TELEOSCOPE_BASE_URL: http://127.0.0.1:3099

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: teleoscope.ca/playwright-report/
          retention-days: 7

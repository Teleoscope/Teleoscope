# Single test suite: must pass on every push/PR to main.
# Guarantees backend unit tests and frontend e2e (Chromium) pass.
name: Test suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt', 'requirements-test.txt') }}

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r requirements-test.txt

      - name: Run unit tests
        run: |
          PYTHONPATH=. python -m pytest tests/ -m "not integration and not e2e" -v --tb=short
        env:
          CI: true

  frontend:
    name: Frontend (e2e)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: teleoscope.ca
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('teleoscope.ca/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: E2E env
        run: |
          touch .env.local
          echo "MONGODB_URI=${{ secrets.MONGODB_ATLAS_TESTING_URI || 'mongodb://localhost:27017' }}" >> .env.local
          echo "PLAYWRIGHT_E2E=1" >> .env.local
          echo "MONGODB_HOST=localhost" >> .env.local

      - name: Run Playwright (Chromium)
        run: pnpm exec playwright test --project=chromium
        env:
          CI: true
          PLAYWRIGHT_E2E: "1"
          # Skip account.spec.ts unless MONGODB_ATLAS_TESTING_URI is set in repo secrets
          PLAYWRIGHT_SKIP_ACCOUNT: "1"
          MONGODB_URI: ${{ secrets.MONGODB_ATLAS_TESTING_URI || 'mongodb://localhost:27017' }}
          MONGODB_HOST: localhost

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: teleoscope.ca/playwright-report/
          retention-days: 7
